<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AUTO-V Dashboard</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="auto-v-favi.png">
<link rel="shortcut icon" type="image/png" href="auto-v-favi.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

.header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #222;
    background:#000;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
    color:#eab308;
    font-size:24px;
    font-weight:bold;
}

.logo img{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 0 12px rgba(234,179,8,0.4);
}

.logout{
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.logout:hover{
    background:#b91c1c;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{
    margin-top:10px;
    margin-bottom:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#111;
    padding:25px;
    border-radius:12px;
    border:1px solid #222;
    transition:.3s;
}

.card:hover{
    border-color:#eab308;
}

.card h2{
    color:#eab308;
    margin-bottom:10px;
    font-size:20px;
}

.count{
    font-size:34px;
    font-weight:bold;
}

.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:35px;
}

.action-btn{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:20px;
    background:#eab308;
    color:black;
    font-weight:bold;
    border-radius:10px;
    transition:.3s;
}

.action-btn:hover{
    opacity:.85;
    transform:translateY(-2px);
}

.section{
    margin-top:45px;
}

.section h2{
    color:#eab308;
    margin-bottom:15px;
}

.table{
    width:100%;
    border-collapse:collapse;
    background:#111;
    border-radius:10px;
    overflow:hidden;
}

.table th,
.table td{
    padding:14px;
    border-bottom:1px solid #222;
    text-align:left;
}

.table th{
    color:#eab308;
    background:#161616;
}

.table tr:hover{
    background:#1b1b1b;
}

@media(max-width:768px){

.header{
    flex-direction:column;
    gap:15px;
}

.logo{
    font-size:20px;
}

.logo img{
    width:50px;
    height:50px;
}

}

</style>
</head>

<body>

<div class="header">

    <div class="logo">
        <img src="auto-v-favi.png" alt="AUTO-V Logo">
        <span>AUTO-V Dashboard</span>
    </div>

    <button onclick="logout()" class="logout">
        Logout
    </button>

</div>

<div class="container">

<h1>Welcome</h1>

<div class="cards">

    <div class="card">
        <h2>Total Vehicles</h2>
        <div class="count" id="vehicleCount">0</div>
    </div>

    <div class="card">
        <h2>Total Valuations</h2>
        <div class="count" id="valuationCount">0</div>
    </div>

    <div class="card">
        <h2>Certificates</h2>
        <div class="count" id="certificateCount">0</div>
    </div>

    <div class="card">
        <h2>Inspections</h2>
        <div class="count" id="inspectionCount">0</div>
    </div>

</div>

<div class="actions">

    <a href="vehicles.html" class="action-btn">
        Add Vehicle
    </a>

    <a href="valuation.html" class="action-btn">
        New Valuation
    </a>

    <a href="inspection.html" class="action-btn">
        Vehicle Inspection
    </a>

    <a href="certificates.html" class="action-btn">
        Certificates
    </a>

</div>

<div class="section">

    <h2>Recent Vehicles</h2>

    <table class="table">

        <thead>
            <tr>
                <th>Registration</th>
                <th>Make</th>
                <th>Model</th>
                <th>Year</th>
            </tr>
        </thead>

        <tbody id="vehicleTable"></tbody>

    </table>

</div>

<div class="section">

    <h2>Recent Valuations</h2>

    <table class="table">

        <thead>
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="valuationTable"></tbody>

    </table>

</div>

</div>

<script>

const SUPABASE_URL =
"https://tsvejnzxrxrrecgquxbq.supabase.co";

const SUPABASE_ANON_KEY =
"YOUR_SUPABASE_ANON_KEY";

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

async function checkUser(){

    const {
        data:{user}
    } = await supabaseClient.auth.getUser();

    if(!user){
        window.location.href="login.html";
        return;
    }

    loadDashboard();

}

async function loadDashboard(){

    // Vehicles

    const {
        data:vehicles,
        error:vehicleError
    } = await supabaseClient
    .from("vehicles")
    .select("*")
    .order("created_at",{ascending:false});

    if(vehicleError){
        console.log(vehicleError);
    }

    document.getElementById("vehicleCount").innerText =
    vehicles?.length || 0;

    // Valuations

    const {
        data:valuations,
        error:valuationError
    } = await supabaseClient
    .from("valuations")
    .select("*")
    .order("created_at",{ascending:false});

    if(valuationError){
        console.log(valuationError);
    }

    document.getElementById("valuationCount").innerText =
    valuations?.length || 0;

    // Certificates

    const {
        data:certificates
    } = await supabaseClient
    .from("certificates")
    .select("*");

    document.getElementById("certificateCount").innerText =
    certificates?.length || 0;

    // Inspections

    const {
        data:inspections
    } = await supabaseClient
    .from("inspections")
    .select("*");

    document.getElementById("inspectionCount").innerText =
    inspections?.length || 0;

    // Vehicle Table

    const vehicleTable =
    document.getElementById("vehicleTable");

    vehicleTable.innerHTML="";

    vehicles?.slice(0,10).forEach(v=>{

        vehicleTable.innerHTML += `
        <tr>
            <td>${v.registration_number ?? ""}</td>
            <td>${v.make ?? ""}</td>
            <td>${v.model ?? ""}</td>
            <td>${v.year ?? ""}</td>
        </tr>
        `;

    });

    // Valuation Table

    const valuationTable =
    document.getElementById("valuationTable");

    valuationTable.innerHTML="";

    valuations?.slice(0,10).forEach(v=>{

        valuationTable.innerHTML += `
        <tr>
            <td>${v.valuation_type ?? ""}</td>
            <td>KES ${Number(v.amount || 0).toLocaleString()}</td>
            <td>${
                v.created_at
                ? new Date(v.created_at).toLocaleDateString()
                : ""
            }</td>
        </tr>
        `;

    });

}

async function logout(){

    await supabaseClient.auth.signOut();

    window.location.href="login.html";

}

checkUser();

</script>

</body>
</html>
