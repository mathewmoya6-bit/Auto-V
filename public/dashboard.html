<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b1120;
            color: #fff;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #111827;
            border-bottom: 2px solid #eab308;
        }
        .logo { font-size: 24px; font-weight: bold; color: #eab308; }
        .logout-btn { background: #dc2626; color: #fff; padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .container { max-width: 1200px; margin: auto; padding: 24px; }
        .card { background: #111827; border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid #1f2937; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .service-card {
            background: #111827;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #1f2937;
            transition: all 0.3s;
        }
        .service-card:hover { border-color: #eab308; transform: translateY(-5px); }
        .service-icon { font-size: 48px; margin-bottom: 10px; }
        .price { font-size: 28px; font-weight: bold; color: #22c55e; margin: 15px 0; }
        .btn-primary {
            background: #eab308;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #1f2937; text-align: left; }
        th { color: #eab308; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .badge-pending { background: #eab308; color: #000; }
        .badge-paid { background: #22c55e; color: #000; }
    </style>
</head>
<body>
    <header>
        <div class="logo">🚗 AUTO-V Dashboard</div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>
    <div class="container">
        <div class="card">
            <h2>Welcome to AUTO-V</h2>
            <div id="email">Loading...</div>
        </div>
        <div class="grid">
            <div class="service-card" onclick="window.location.href='valuation.html'">
                <div class="service-icon">💰</div>
                <h3>Vehicle Valuation</h3>
                <div class="price" id="valuationPrice">KES 2,500</div>
                <button class="btn-primary">Start Valuation →</button>
            </div>
            <div class="service-card" onclick="window.location.href='inspection.html'">
                <div class="service-icon">🔍</div>
                <h3>Vehicle Inspection</h3>
                <div class="price" id="inspectionPrice">KES 3,500</div>
                <button class="btn-primary">Start Inspection →</button>
            </div>
        </div>
        <div class="card">
            <h2>📋 My Service History</h2>
            <div style="overflow-x: auto;">
                <table id="historyTable">
                    <thead><tr><th>Date</th><th>Service</th><th>Vehicle</th><th>Amount</th><th>Status</th></tr></thead>
                    <tbody id="historyBody"><tr><td colspan="5" style="text-align:center;">Loading...<\/td><\/tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        const supabase = window.AUTO_V_CONFIG?.supabase || window.supabase.createClient(
            "https://tsvejnzxrxrrecgquxbq.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ"
        );
        let currentUser = null;
        
        async function init() {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) { window.location.href = "login.html"; return; }
            currentUser = user;
            document.getElementById('email').innerHTML = `Logged in as: ${user.email}`;
            await loadHistory();
        }
        
        async function loadHistory() {
            const { data } = await supabase.from('service_requests').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            const tbody = document.getElementById('historyBody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="5">No requests yet<\/td><\/tr>'; return; }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${new Date(r.created_at).toLocaleString()}</td>
                    <td>${r.service_type === 'valuation' ? '💰 Valuation' : '🔍 Inspection'}</td>
                    <td>${r.make} ${r.model} ($ {r.registration_number})</td>
                    <td>KES ${(r.amount || 0).toLocaleString()}</td>
                    <td><span class="badge badge-${r.payment_status === 'paid' ? 'paid' : 'pending'}">${r.payment_status || 'pending'}</span></td>
                </tr>
            `).join('');
        }
        
        document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); window.location.href = "login.html"; };
        init();
    </script>
</body>
</html>
