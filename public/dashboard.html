<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AUTO-V | Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23eab308' rx='20'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='%23000'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0b1120;
            color: #fff;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #111827;
            border-bottom: 2px solid #eab308;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; color: #eab308; display: flex; align-items: center; gap: 10px; }
        .logo span { font-size: 12px; color: #94a3b8; }
        .logout-btn { background: #dc2626; color: #fff; padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1200px; margin: auto; padding: 24px; }
        .card {
            background: #111827;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #1f2937;
        }
        h2 { color: #eab308; margin-bottom: 20px; font-size: 22px; border-left: 4px solid #eab308; padding-left: 15px; }
        h3 { color: #eab308; margin: 20px 0 15px 0; font-size: 18px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-card h3 { color: #94a3b8; font-size: 12px; margin-bottom: 10px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #22c55e; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1f2937; }
        th { color: #eab308; }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }
        .badge-paid { background: #22c55e; color: #000; }
        .badge-completed { background: #8b5cf6; color: #fff; }
        .view-btn { background: #eab308; color: #000; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; border: none; }
        .view-btn:hover { background: #facc15; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #0f172a;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            border: 2px solid #eab308;
        }
        .modal-content h3 { color: #eab308; margin-bottom: 15px; }
        .result-value { font-size: 32px; font-weight: bold; color: #22c55e; text-align: center; margin: 15px 0; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #eab308;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .new-request-btn {
            background: #eab308;
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .new-request-btn:hover { background: #facc15; }
        .btn-secondary { background: #334155; color: white; padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; }
        @media (max-width: 768px) {
            th, td { font-size: 12px; padding: 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🚗 AUTO-V <span>| Dashboard</span></div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>
    <div class="container">
        <div class="card">
            <h2>Welcome to AUTO-V</h2>
            <div id="userInfo" style="color: #94a3b8;">Loading...</div>
            <button class="new-request-btn" id="newRequestBtn">+ New Valuation / Inspection</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Valuations</h3><div class="stat-number" id="totalValuations">0</div></div>
            <div class="stat-card"><h3>Total Inspections</h3><div class="stat-number" id="totalInspections">0</div></div>
            <div class="stat-card"><h3>Total Spent</h3><div class="stat-number" id="totalSpent">KES 0</div></div>
            <div class="stat-card"><h3>Active Certificates</h3><div class="stat-number" id="totalCertificates">0</div></div>
        </div>

        <!-- History Table -->
        <div class="card">
            <h2>📋 My Service History</h2>
            <div style="overflow-x: auto;">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Request ID</th>
                            <th>Service</th>
                            <th>Vehicle</th>
                            <th>Purpose</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="8" style="text-align:center;padding:40px;">Loading your requests...<\/td><\/tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Valuation Result</h3>
            <div id="modalContent"></div>
            <button class="btn-secondary" onclick="closeModal()" style="margin-top: 15px;">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        async function checkAuth() {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) { window.location.href = "login.html"; return false; }
            currentUser = user;
            document.getElementById('userInfo').innerHTML = `Logged in as: <strong>${user.email}</strong>`;
            return true;
        }

        async function loadHistory() {
            try {
                const { data, error } = await supabase
                    .from('service_requests')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('historyBody');
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;">No requests yet. Click "New Request" to start.<\/td><\/tr>';
                    document.getElementById('totalValuations').innerText = '0';
                    document.getElementById('totalInspections').innerText = '0';
                    document.getElementById('totalSpent').innerHTML = 'KES 0';
                    document.getElementById('totalCertificates').innerText = '0';
                    return;
                }

                const valuations = data.filter(r => r.service_type === 'valuation');
                const inspections = data.filter(r => r.service_type === 'inspection');
                const totalSpent = data.reduce((sum, r) => sum + (r.amount || 0), 0);
                const certificates = data.filter(r => r.result && r.result.certificate_number);

                document.getElementById('totalValuations').innerText = valuations.length;
                document.getElementById('totalInspections').innerText = inspections.length;
                document.getElementById('totalSpent').innerHTML = `KES ${totalSpent.toLocaleString()}`;
                document.getElementById('totalCertificates').innerText = certificates.length;

                tbody.innerHTML = data.map(r => {
                    const result = r.result || {};
                    const shortId = r.id.substring(0, 8).toUpperCase();
                    
                    let statusBadge = '';
                    if (r.payment_status === 'paid' && r.status === 'completed') {
                        statusBadge = '<span class="badge badge-paid">Completed</span>';
                    } else if (r.payment_status === 'paid') {
                        statusBadge = '<span class="badge badge-paid">Paid</span>';
                    } else {
                        statusBadge = '<span class="badge badge-pending" style="background:#eab308;color:#000;">Pending</span>';
                    }

                    return `
                        <tr>
                            <td>${new Date(r.created_at).toLocaleDateString()}<\/td>
                            <td><span style="font-family:monospace; font-size:11px;">${shortId}<\/span><\/td>
                            <td>${r.service_type === 'valuation' ? '💰 Valuation' : '🔍 Inspection'}<\/td>
                            <td>${r.make} ${r.model} (${r.registration_number || 'N/A'})<\/td>
                            <td>${r.valuation_purpose || '-'}<\/td>
                            <td>KES ${(r.amount || 0).toLocaleString()}<\/td>
                            <td>${statusBadge}<\/td>
                            <td><button class="view-btn" onclick="viewResult('${r.id}', '${r.service_type}')">View Result</button><\/td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading history:', error);
                document.getElementById('historyBody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;">Error loading data. Please refresh.<\/td><\/tr>';
            }
        }

        window.viewResult = async (id, serviceType) => {
            try {
                const { data, error } = await supabase
                    .from('service_requests')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error) throw error;

                const result = data.result || {};
                const modal = document.getElementById('resultModal');
                const title = document.getElementById('modalTitle');
                const content = document.getElementById('modalContent');

                title.innerHTML = serviceType === 'valuation' ? '💰 Valuation Result' : '🔍 Inspection Report';

                if (serviceType === 'valuation') {
                    content.innerHTML = `
                        <div class="result-value">KES ${(result.market_value || 0).toLocaleString()}</div>
                        <div style="background:#1e293b; padding:15px; border-radius:12px;">
                            <div style="display:flex; justify-content:space-between; padding:8px 0;"><span>Insurance Value:</span><strong>KES ${(result.insurance_value || 0).toLocaleString()}</strong></div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0;"><span>Trade-In Value:</span><strong>KES ${(result.trade_in_value || 0).toLocaleString()}</strong></div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0;"><span>Forced Sale Value:</span><strong>KES ${(result.forced_sale_value || 0).toLocaleString()}</strong></div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-top:1px solid #334155; margin-top:8px; padding-top:12px;"><span>Certificate Number:</span><strong>${result.certificate_number || 'N/A'}</strong></div>
                        </div>
                        <div style="margin-top:15px; padding:12px; background:#14532d; border-radius:8px; text-align:center;">
                            <p style="color:#22c55e;">✅ Official Valuation Certificate</p>
                            <p style="font-size:11px;">Valid for 90 days from issue date</p>
                        </div>
                    `;
                } else {
                    content.innerHTML = `
                        <div class="result-value">${result.overall_score || 'N/A'}%</div>
                        <div style="background:#1e293b; padding:15px; border-radius:12px;">
                            <div style="display:flex; justify-content:space-between; padding:8px 0;"><span>Engine Score:</span><strong>${result.engine_score || result.engine || 'N/A'}/10</strong></div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0;"><span>Transmission:</span><strong>${result.transmission_score || result.transmission || 'N/A'}/10</strong></div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0;"><span>Body Condition:</span><strong>${result.body_score || result.body || 'N/A'}/10</strong></div>
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-top:1px solid #334155; margin-top:8px; padding-top:12px;"><span>Certificate Number:</span><strong>${result.certificate_number || 'N/A'}</strong></div>
                        </div>
                        <div style="margin-top:15px; padding:12px; background:#14532d; border-radius:8px; text-align:center;">
                            <p style="color:#22c55e;">✅ Inspection Report Certified</p>
                        </div>
                    `;
                }

                modal.style.display = 'flex';

            } catch (error) {
                alert('Error loading result: ' + error.message);
            }
        };

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            window.location.href = "login.html";
        };

        document.getElementById('newRequestBtn').onclick = () => {
            window.location.href = "customer-portal.html";
        };

        // Real-time subscription for updates
        function setupRealtime() {
            supabase
                .channel('service_requests_changes')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'service_requests',
                    filter: `user_id=eq.${currentUser.id}`
                }, () => loadHistory())
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'service_requests',
                    filter: `user_id=eq.${currentUser.id}`
                }, () => loadHistory())
                .subscribe();
        }

        async function init() {
            if (!await checkAuth()) return;
            await loadHistory();
            setupRealtime();
        }

        init();
    </script>
</body>
</html>
