<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AUTO-V Dashboard</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" type="image/png" href="favicon.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
font-size:24px;
font-weight:bold;
color:#eab308;
}

.logout{
background:#dc2626;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.logout:hover{
background:#b91c1c;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#111;
padding:25px;
border-radius:12px;
border:1px solid #222;
}

.card h2{
color:#eab308;
margin-bottom:10px;
}

.count{
font-size:32px;
font-weight:bold;
}

.actions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.action-btn{
display:block;
text-decoration:none;
text-align:center;
padding:20px;
background:#eab308;
color:black;
font-weight:bold;
border-radius:10px;
transition:opacity 0.3s;
}

.action-btn:hover{
opacity:0.8;
}

.section{
margin-top:40px;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

.table th,
.table td{
padding:12px;
border-bottom:1px solid #222;
text-align:left;
}

.table th{
color:#eab308;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
AUTO-V Dashboard
</div>

<button onclick="logout()" class="logout">
Logout
</button>

</div>

<div class="container">

<h1>Welcome</h1>

<div class="cards">

<div class="card">
<h2>Total Vehicles</h2>
<div class="count" id="vehicleCount">0</div>
</div>

<div class="card">
<h2>Total Valuations</h2>
<div class="count" id="valuationCount">0</div>
</div>

<div class="card">
<h2>Certificates</h2>
<div class="count" id="certificateCount">0</div>
</div>

<div class="card">
<h2>Inspections</h2>
<div class="count" id="inspectionCount">0</div>
</div>

</div>

<div class="actions">

<a href="vehicles.html" class="action-btn">
Add Vehicle
</a>

<a href="valuation.html" class="action-btn">
New Valuation
</a>

<a href="inspection.html" class="action-btn">
Vehicle Inspection
</a>

<a href="certificates.html" class="action-btn">
Certificates
</a>

</div>

<div class="section">

<h2>Recent Vehicles</h2>

<table class="table">

<thead>
<tr>
<th>Registration</th>
<th>Make</th>
<th>Model</th>
<th>Year</th>
</tr>
</thead>

<tbody id="vehicleTable"></tbody>

</table>

</div>

<div class="section">

<h2>Recent Valuations</h2>

<table class="table">

<thead>
<tr>
<th>Type</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody id="valuationTable"></tbody>

</table>

</div>

</div>

<script>

const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

async function checkUser(){
    const { data: { user }, error } = await supabaseClient.auth.getUser();
    
    if (error || !user) {
        window.location.replace("login.html");
        return false;
    }
    
    return true;
}

async function loadDashboard(){
    // Get vehicles
    const { data: vehicles } = await supabaseClient
        .from("vehicles")
        .select("*");
    
    document.getElementById("vehicleCount").innerText = vehicles?.length || 0;
    
    // Get valuations
    const { data: valuations } = await supabaseClient
        .from("valuations")
        .select("*");
    
    document.getElementById("valuationCount").innerText = valuations?.length || 0;
    
    document.getElementById("certificateCount").innerText = "0";
    document.getElementById("inspectionCount").innerText = "0";
    
    const vehicleTable = document.getElementById("vehicleTable");
    vehicleTable.innerHTML = "";
    
    vehicles?.slice(0,10).forEach(v=>{
        vehicleTable.innerHTML += `
        <tr>
            <td>${v.registration_number}</td>
            <td>${v.make}</td>
            <td>${v.model}</td>
            <td>${v.year}</td>
        </tr>
        `;
    });
    
    const valuationTable = document.getElementById("valuationTable");
    valuationTable.innerHTML = "";
    
    valuations?.slice(0,10).forEach(v=>{
        valuationTable.innerHTML += `
        <tr>
            <td>${v.valuation_type}</td>
            <td>KES ${Number(v.amount).toLocaleString()}</td>
            <td>${new Date(v.created_at).toLocaleDateString()}</td>
        </tr>
        `;
    });
}

async function logout(){
    await supabaseClient.auth.signOut();
    window.location.replace("login.html");
}

// Main execution
async function init() {
    const isAuthenticated = await checkUser();
    if (isAuthenticated) {
        await loadDashboard();
    }
}

init();

</script>

</body>
</html>
