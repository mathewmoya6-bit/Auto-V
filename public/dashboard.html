<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AUTO-V Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:Segoe UI,Arial;background:#0b1120;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#111827;border-bottom:2px solid #eab308}
.logo{font-weight:bold;font-size:24px;color:#eab308}
.container{max-width:1100px;margin:auto;padding:24px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
button{background:#eab308;color:#000;border:0;padding:10px 16px;border-radius:8px;font-weight:bold;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #222;text-align:left}
.badge{padding:4px 10px;border-radius:12px;background:#374151}
</style>
</head>
<body>
<header>
<div class="logo">AUTO‑V Dashboard</div>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h2>Welcome</h2>
<div id="email">Loading...</div>
</div>

<div class="grid">
<div class="card">
<h3>Vehicle Valuation</h3>
<p>Start a new valuation.</p>
<button onclick="location.href='valuation.html'">Start</button>
</div>

<div class="card">
<h3>Vehicle Inspection</h3>
<p>Start a new inspection.</p>
<button onclick="location.href='inspection.html'">Start</button>
</div>
</div>

<div class="card">
<h2>My Requests</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Service</th>
<th>Vehicle</th>
<th>Status</th>
<th>Payment</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="5">Loading...</td></tr>
</tbody>
</table>
</div>

</div>

<script>
const SUPABASE_URL="YOUR_SUPABASE_URL";
const SUPABASE_KEY="YOUR_SUPABASE_ANON_KEY";
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentUser=null;

async function init(){
 const {data:{user}}=await supabase.auth.getUser();
 if(!user){
   location.href="login.html";
   return;
 }
 currentUser=user;
 document.getElementById("email").textContent=user.email;
 await loadHistory();
 subscribeRealtime();
}

async function loadHistory(){
 const {data,error}=await supabase
  .from("service_requests")
  .select("*")
  .eq("user_id",currentUser.id)
  .order("created_at",{ascending:false});

 const tb=document.getElementById("tbody");
 if(error){
   tb.innerHTML="<tr><td colspan='5'>"+error.message+"</td></tr>";
   return;
 }
 if(!data||data.length===0){
   tb.innerHTML="<tr><td colspan='5'>No requests</td></tr>";
   return;
 }

 tb.innerHTML=data.map(r=>`
<tr>
<td>${new Date(r.created_at).toLocaleString()}</td>
<td>${r.service_type}</td>
<td>${r.make||""} ${r.model||""} (${r.registration_number||""})</td>
<td><span class="badge">${r.status}</span></td>
<td><span class="badge">${r.payment_status}</span></td>
</tr>`).join("");
}

function subscribeRealtime(){
 supabase.channel("service_requests_live")
 .on("postgres_changes",
   {event:"*",schema:"public",table:"service_requests"},
   ()=>loadHistory())
 .subscribe();
}

async function logout(){
 await supabase.auth.signOut();
 location.href="login.html";
}

init();
</script>
</body>
</html>
