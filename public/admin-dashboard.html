<!-- Replace the Pricing Tab section in admin-dashboard.html with this complete implementation -->

<!-- Pricing Tab - Complete Dynamic Pricing -->
<div id="pricingTab" class="card" style="display:none;">
    <h2>💰 Dynamic Pricing Configuration</h2>
    <p style="color: #94a3b8; margin-bottom: 20px;">Pricing based on Vehicle Category + Valuation Purpose + Service Level</p>
    
    <!-- Quick Filter -->
    <div class="form-row" style="margin-bottom: 20px;">
        <div class="form-group">
            <label>Filter by Vehicle Category</label>
            <select id="priceFilterCategory" onchange="filterPricingTable()">
                <option value="all">All Categories</option>
                <option value="passenger_car">Passenger Car</option>
                <option value="suv">SUV / 4x4</option>
                <option value="motorcycle">Motorcycle</option>
                <option value="tuk_tuk">Tuk-tuk / 3-Wheeler</option>
                <option value="commercial">Commercial Vehicle</option>
                <option value="farm">Farm Machinery</option>
                <option value="industrial">Industrial Machinery</option>
                <option value="specialty">Specialty Vehicle</option>
            </select>
        </div>
        <div class="form-group">
            <label>Filter by Service Type</label>
            <select id="priceFilterService" onchange="filterPricingTable()">
                <option value="all">All Services</option>
                <option value="valuation">Valuation</option>
                <option value="inspection">Inspection</option>
                <option value="premium">Premium Valuation</option>
            </select>
        </div>
        <div class="form-group">
            <label>Bulk Action</label>
            <select id="bulkAction">
                <option value="">Select Action</option>
                <option value="increase_5">Increase All by 5%</option>
                <option value="decrease_5">Decrease All by 5%</option>
                <option value="round_up">Round to Nearest 100</option>
            </select>
            <button class="btn btn-warning" onclick="applyBulkAction()" style="margin-top: 5px;">Apply to Filtered</button>
        </div>
    </div>

    <!-- Pricing Table -->
    <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
        <table id="pricingTable">
            <thead>
                <tr style="position: sticky; top: 0; background: #0f172a;">
                    <th>Vehicle Category</th>
                    <th>Sub Category</th>
                    <th>Valuation Purpose</th>
                    <th>Service Level</th>
                    <th>Base Price (KES)</th>
                    <th>Express Fee (KES)</th>
                    <th>Certificate Fee</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="pricingBody">
                <tr><td colspan="8" style="text-align:center;">Loading pricing data...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Add New Price Rule -->
    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #1e293b;">
        <h3>➕ Add New Pricing Rule</h3>
        <div class="form-row">
            <div class="form-group"><label>Vehicle Category</label>
                <select id="newVehicleCategory">
                    <option value="passenger_car">Passenger Car</option>
                    <option value="suv">SUV / 4x4</option>
                    <option value="motorcycle">Motorcycle</option>
                    <option value="tuk_tuk">Tuk-tuk / 3-Wheeler</option>
                    <option value="commercial">Commercial Vehicle</option>
                    <option value="farm">Farm Machinery</option>
                    <option value="industrial">Industrial Machinery</option>
                    <option value="specialty">Specialty Vehicle</option>
                </select>
            </div>
            <div class="form-group"><label>Sub Category</label><input type="text" id="newSubCategory" placeholder="e.g., Luxury, Compact, Heavy"></div>
            <div class="form-group"><label>Valuation Purpose</label>
                <select id="newPurpose">
                    <option value="just_know">Just Want to Know (FREE)</option>
                    <option value="pre_insurance">Pre-Insurance Valuation</option>
                    <option value="claim_verification">Insurance Claim Verification</option>
                    <option value="loan_collateral">Loan / Collateral Valuation</option>
                    <option value="court_case">Legal / Court Case Valuation</option>
                    <option value="pre_purchase">Pre-Purchase Valuation</option>
                    <option value="import_valuation">Import / Customs Valuation</option>
                    <option value="fleet_valuation">Fleet / Corporate Valuation</option>
                    <option value="total_loss">Total Loss Assessment</option>
                    <option value="classic_valuation">Classic / Vintage Valuation</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Service Level</label>
                <select id="newServiceLevel">
                    <option value="standard">Standard</option>
                    <option value="premium">Premium</option>
                    <option value="express">Express (2 hours)</option>
                </select>
            </div>
            <div class="form-group"><label>Base Price (KES)</label><input type="number" id="newBasePrice" placeholder="2500"></div>
            <div class="form-group"><label>Express Fee (KES)</label><input type="number" id="newExpressFee" placeholder="1000"></div>
        </div>
        <button class="btn btn-success" onclick="addPricingRule()">+ Add Pricing Rule</button>
    </div>

    <!-- Quick Edit Modal -->
    <div id="editPricingModal" class="modal">
        <div class="modal-content">
            <h3>Edit Pricing Rule</h3>
            <input type="hidden" id="editPricingId">
            <div class="form-group"><label>Base Price (KES)</label><input type="number" id="editBasePrice"></div>
            <div class="form-group"><label>Express Fee (KES)</label><input type="number" id="editExpressFee"></div>
            <div class="form-group"><label>Certificate Fee (KES)</label><input type="number" id="editCertificateFee"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-success" onclick="updatePricingRule()">Save Changes</button>
                <button class="btn btn-danger" onclick="closeEditPricingModal()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
// Complete Pricing Management Functions
let allPricingRules = [];

// Load pricing from Supabase
async function loadPricingRules() {
    const { data, error } = await supabase
        .from('pricing_rules')
        .select('*')
        .order('vehicle_category', { ascending: true });
    
    if (error) {
        console.error('Error loading pricing:', error);
        // Initialize default pricing if table is empty
        await initializeDefaultPricing();
        return;
    }
    
    allPricingRules = data || [];
    renderPricingTable();
}

// Initialize default pricing rules
async function initializeDefaultPricing() {
    const defaultPricing = [
        // Passenger Cars
        { vehicle_category: 'passenger_car', sub_category: 'Standard', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'passenger_car', sub_category: 'Standard', purpose: 'pre_insurance', service_level: 'standard', base_price: 2500, express_fee: 1000, certificate_fee: 500 },
        { vehicle_category: 'passenger_car', sub_category: 'Standard', purpose: 'loan_collateral', service_level: 'standard', base_price: 3000, express_fee: 1000, certificate_fee: 500 },
        { vehicle_category: 'passenger_car', sub_category: 'Standard', purpose: 'court_case', service_level: 'premium', base_price: 5000, express_fee: 2000, certificate_fee: 1000 },
        
        // SUVs
        { vehicle_category: 'suv', sub_category: 'Standard', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'suv', sub_category: 'Standard', purpose: 'pre_insurance', service_level: 'standard', base_price: 3000, express_fee: 1000, certificate_fee: 500 },
        { vehicle_category: 'suv', sub_category: 'Luxury', purpose: 'pre_insurance', service_level: 'premium', base_price: 5000, express_fee: 2000, certificate_fee: 1000 },
        
        // Motorcycles
        { vehicle_category: 'motorcycle', sub_category: 'Commuter', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'motorcycle', sub_category: 'Commuter', purpose: 'pre_insurance', service_level: 'standard', base_price: 1000, express_fee: 500, certificate_fee: 300 },
        { vehicle_category: 'motorcycle', sub_category: 'Sport', purpose: 'pre_insurance', service_level: 'standard', base_price: 1500, express_fee: 500, certificate_fee: 300 },
        { vehicle_category: 'motorcycle', sub_category: 'Cruiser', purpose: 'premium', service_level: 'premium', base_price: 3000, express_fee: 1000, certificate_fee: 500 },
        
        // Tuk-tuk / 3-Wheeler
        { vehicle_category: 'tuk_tuk', sub_category: 'Passenger', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'tuk_tuk', sub_category: 'Passenger', purpose: 'pre_insurance', service_level: 'standard', base_price: 2000, express_fee: 500, certificate_fee: 300 },
        { vehicle_category: 'tuk_tuk', sub_category: 'Cargo', purpose: 'loan_collateral', service_level: 'standard', base_price: 2500, express_fee: 500, certificate_fee: 300 },
        
        // Commercial Vehicles
        { vehicle_category: 'commercial', sub_category: 'Light', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'commercial', sub_category: 'Light', purpose: 'fleet_valuation', service_level: 'standard', base_price: 3500, express_fee: 1000, certificate_fee: 500 },
        { vehicle_category: 'commercial', sub_category: 'Heavy', purpose: 'fleet_valuation', service_level: 'premium', base_price: 7000, express_fee: 2000, certificate_fee: 1000 },
        
        // Farm Machinery
        { vehicle_category: 'farm', sub_category: 'Tractor', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'farm', sub_category: 'Tractor', purpose: 'loan_collateral', service_level: 'standard', base_price: 5000, express_fee: 1500, certificate_fee: 1000 },
        { vehicle_category: 'farm', sub_category: 'Combine', purpose: 'total_loss', service_level: 'premium', base_price: 10000, express_fee: 3000, certificate_fee: 2000 },
        
        // Industrial Machinery
        { vehicle_category: 'industrial', sub_category: 'Excavator', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'industrial', sub_category: 'Excavator', purpose: 'loan_collateral', service_level: 'premium', base_price: 15000, express_fee: 5000, certificate_fee: 3000 },
        { vehicle_category: 'industrial', sub_category: 'Forklift', purpose: 'fleet_valuation', service_level: 'standard', base_price: 5000, express_fee: 1500, certificate_fee: 1000 },
        
        // Specialty Vehicles
        { vehicle_category: 'specialty', sub_category: 'Golf Cart', purpose: 'just_know', service_level: 'standard', base_price: 0, express_fee: 0, certificate_fee: 0 },
        { vehicle_category: 'specialty', sub_category: 'Golf Cart', purpose: 'pre_insurance', service_level: 'standard', base_price: 2000, express_fee: 500, certificate_fee: 300 },
        { vehicle_category: 'specialty', sub_category: 'Classic Car', purpose: 'classic_valuation', service_level: 'premium', base_price: 10000, express_fee: 3000, certificate_fee: 2000 }
    ];
    
    for (const rule of defaultPricing) {
        const { error } = await supabase
            .from('pricing_rules')
            .upsert(rule, { onConflict: 'vehicle_category,sub_category,purpose,service_level' });
        if (error) console.error('Error inserting default pricing:', error);
    }
    
    await loadPricingRules();
}

// Render pricing table
function renderPricingTable() {
    const tbody = document.getElementById('pricingBody');
    const categoryFilter = document.getElementById('priceFilterCategory')?.value || 'all';
    const serviceFilter = document.getElementById('priceFilterService')?.value || 'all';
    
    let filtered = [...allPricingRules];
    
    if (categoryFilter !== 'all') {
        filtered = filtered.filter(r => r.vehicle_category === categoryFilter);
    }
    if (serviceFilter !== 'all') {
        if (serviceFilter === 'valuation') filtered = filtered.filter(r => r.service_level === 'standard' && r.base_price > 0);
        else if (serviceFilter === 'premium') filtered = filtered.filter(r => r.service_level === 'premium');
        else if (serviceFilter === 'inspection') filtered = filtered.filter(r => r.purpose === 'inspection');
    }
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No pricing rules found. Add one below.<\/td><\/tr>';
        return;
    }
    
    const purposeNames = {
        'just_know': '💰 Just Want to Know (FREE)', 'pre_insurance': '🛡️ Pre-Insurance', 'claim_verification': '📋 Claim Verification',
        'loan_collateral': '🏦 Loan Collateral', 'court_case': '⚖️ Court Case', 'pre_purchase': '🔍 Pre-Purchase',
        'import_valuation': '🌍 Import Valuation', 'fleet_valuation': '🚛 Fleet Valuation', 'total_loss': '⚠️ Total Loss',
        'classic_valuation': '🏆 Classic Valuation'
    };
    
    const categoryNames = {
        'passenger_car': '🚗 Passenger Car', 'suv': '🚙 SUV/4x4', 'motorcycle': '🏍️ Motorcycle',
        'tuk_tuk': '🛺 Tuk-tuk', 'commercial': '🚚 Commercial', 'farm': '🚜 Farm Machinery',
        'industrial': '🏗️ Industrial', 'specialty': '⛳ Specialty'
    };
    
    tbody.innerHTML = filtered.map(rule => `
        <tr>
            <td>${categoryNames[rule.vehicle_category] || rule.vehicle_category}<\/td>
            <td>${rule.sub_category || '-'}<\/td>
            <td>${purposeNames[rule.purpose] || rule.purpose}<\/td>
            <td><span class="badge ${rule.service_level === 'premium' ? 'badge-active' : 'badge-pending'}">${rule.service_level.toUpperCase()}</span><\/td>
            <td>KES ${(rule.base_price || 0).toLocaleString()}<\/td>
            <td>KES ${(rule.express_fee || 0).toLocaleString()}<\/td>
            <td>KES ${(rule.certificate_fee || 0).toLocaleString()}<\/td>
            <td><button class="btn" onclick="openEditPricingModal('${rule.id}')">Edit</button><\/td>
        </tr>
    `).join('');
}

// Filter pricing table
function filterPricingTable() {
    renderPricingTable();
}

// Open edit modal
window.openEditPricingModal = async (id) => {
    const rule = allPricingRules.find(r => r.id === id);
    if (rule) {
        document.getElementById('editPricingId').value = rule.id;
        document.getElementById('editBasePrice').value = rule.base_price;
        document.getElementById('editExpressFee').value = rule.express_fee;
        document.getElementById('editCertificateFee').value = rule.certificate_fee;
        document.getElementById('editPricingModal').style.display = 'flex';
    }
};

// Update pricing rule
window.updatePricingRule = async () => {
    const id = document.getElementById('editPricingId').value;
    const updates = {
        base_price: parseInt(document.getElementById('editBasePrice').value) || 0,
        express_fee: parseInt(document.getElementById('editExpressFee').value) || 0,
        certificate_fee: parseInt(document.getElementById('editCertificateFee').value) || 0
    };
    
    const { error } = await supabase.from('pricing_rules').update(updates).eq('id', id);
    if (error) {
        showMessage('Error updating pricing: ' + error.message, 'error');
    } else {
        showMessage('Pricing updated successfully! Real-time sync active.', 'success');
        closeEditPricingModal();
        await loadPricingRules();
    }
};

// Add new pricing rule
window.addPricingRule = async () => {
    const newRule = {
        vehicle_category: document.getElementById('newVehicleCategory').value,
        sub_category: document.getElementById('newSubCategory').value || 'Standard',
        purpose: document.getElementById('newPurpose').value,
        service_level: document.getElementById('newServiceLevel').value,
        base_price: parseInt(document.getElementById('newBasePrice').value) || 0,
        express_fee: parseInt(document.getElementById('newExpressFee').value) || 0,
        certificate_fee: Math.round(parseInt(document.getElementById('newBasePrice').value) * 0.2) || 500
    };
    
    const { error } = await supabase.from('pricing_rules').insert(newRule);
    if (error) {
        showMessage('Error adding pricing rule: ' + error.message, 'error');
    } else {
        showMessage('Pricing rule added!', 'success');
        // Clear form
        document.getElementById('newSubCategory').value = '';
        document.getElementById('newBasePrice').value = '';
        document.getElementById('newExpressFee').value = '';
        await loadPricingRules();
    }
};

// Bulk action
window.applyBulkAction = async () => {
    const action = document.getElementById('bulkAction').value;
    if (!action) return;
    
    const categoryFilter = document.getElementById('priceFilterCategory').value;
    const serviceFilter = document.getElementById('priceFilterService').value;
    
    let filtered = [...allPricingRules];
    if (categoryFilter !== 'all') filtered = filtered.filter(r => r.vehicle_category === categoryFilter);
    if (serviceFilter !== 'all') filtered = filtered.filter(r => r.service_level === serviceFilter || (serviceFilter === 'valuation' && r.base_price > 0));
    
    for (const rule of filtered) {
        let newPrice = rule.base_price;
        if (action === 'increase_5') newPrice = Math.round(rule.base_price * 1.05);
        if (action === 'decrease_5') newPrice = Math.round(rule.base_price * 0.95);
        if (action === 'round_up') newPrice = Math.ceil(rule.base_price / 100) * 100;
        
        await supabase.from('pricing_rules').update({ base_price: newPrice }).eq('id', rule.id);
    }
    
    showMessage(`Bulk action "${action}" applied to ${filtered.length} rules!`, 'success');
    await loadPricingRules();
};

// Get price for specific vehicle and purpose (used by valuation engine)
async function getPriceForVehicle(category, subCategory, purpose, serviceLevel = 'standard') {
    const { data, error } = await supabase
        .from('pricing_rules')
        .select('base_price, express_fee, certificate_fee')
        .eq('vehicle_category', category)
        .eq('sub_category', subCategory)
        .eq('purpose', purpose)
        .eq('service_level', serviceLevel)
        .single();
    
    if (error) {
        // Fallback to default pricing
        return { base_price: 2500, express_fee: 1000, certificate_fee: 500 };
    }
    return data;
}

function closeEditPricingModal() {
    document.getElementById('editPricingModal').style.display = 'none';
}

// Create pricing_rules table if not exists
async function initPricingTable() {
    // Check if table exists by trying to select
    const { error } = await supabase.from('pricing_rules').select('count', { count: 'exact', head: true });
    if (error && error.message.includes('relation') && error.message.includes('does not exist')) {
        // Create table via Supabase SQL (user needs to run this once)
        console.log('Pricing rules table not found. Please run the SQL creation script.');
        showMessage('Pricing table not found. Please run the database setup SQL.', 'error');
    } else {
        await loadPricingRules();
    }
}

// Add realtime subscription for pricing updates
function subscribeToPricingUpdates() {
    const channel = supabase
        .channel('pricing_updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'pricing_rules' }, () => {
            console.log('Pricing updated in real-time');
            loadPricingRules();
        })
        .subscribe();
    return channel;
}
</script>
