<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Admin Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0c15;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: auto; }
        header {
            background: #0f172a;
            padding: 16px 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 24px; font-weight: bold; color: #eab308; }
        .logout-btn { background: #dc2626; color: white; padding: 8px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0f172a;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #1e293b;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #22c55e; }
        .card {
            background: #0f172a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
        }
        h2 { color: #eab308; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1e293b; }
        th { color: #eab308; }
        .btn { background: #eab308; color: black; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚗 AUTO-V Admin</div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </header>

            <div class="stat-card"><h3>Total Inspections</h3><div class="stat-number" id="totalInspections">0</div></div>
            <div class="stat-card"><h3>Total Revenue</h3><div class="stat-number" id="totalRevenue">KES 0</div></div>
