<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Vehicle Inspection</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0c15;
            color: white;
            padding: 20px;
        }
        .container { max-width: 800px; margin: auto; }
        .card {
            background: #0f172a;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
        }
        h2 { color: #eab308; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary { background: #eab308; color: black; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🔍 Vehicle Inspection</h2>
            <div class="form-group"><label>Registration Number</label><input type="text" id="reg" placeholder="KCA 123A"></div>
            <div class="form-group"><label>Make</label><input type="text" id="make" placeholder="Toyota"></div>
            <div class="form-group"><label>Model</label><input type="text" id="model" placeholder="Axio"></div>
            <div class="form-group"><label>Year</label><input type="number" id="year" placeholder="2020"></div>
            <div class="form-group"><label>Mileage (km)</label><input type="number" id="mileage" placeholder="50000"></div>
            <button class="btn btn-primary" id="submitBtn">Proceed to Payment →</button>
        </div>
    </div>
    <script>
        const supabase = window.AUTO_V_CONFIG?.supabase || window.supabase.createClient(
            "https://tsvejnzxrxrrecgquxbq.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ"
        );
        let currentUser = null;
        
        async function init() {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) { window.location.href = "login.html"; return; }
            currentUser = user;
        }
        
        async function proceed() {
            const reg = document.getElementById('reg').value;
            const make = document.getElementById('make').value;
            const model = document.getElementById('model').value;
            const year = parseInt(document.getElementById('year').value);
            const mileage = parseInt(document.getElementById('mileage').value) || 0;
            
            if (!reg || !make || !model || !year) { alert('Please fill all fields'); return; }
            
            const { data: request, error } = await supabase.from('service_requests').insert({
                user_id: currentUser.id,
                service_type: 'inspection',
                registration_number: reg,
                make: make,
                model: model,
                year: year,
                mileage: mileage,
                amount: 3500,
                payment_status: 'pending',
                status: 'awaiting_payment'
            }).select().single();
            
            if (error) { alert('Error: ' + error.message); return; }
            
            window.location.href = `payment.html?id=${request.id}&type=inspection&amount=3500&ref=INS${request.id.slice(0,8)}`;
        }
        
        document.getElementById('submitBtn').onclick = proceed;
        init();
    </script>
</body>
</html>
