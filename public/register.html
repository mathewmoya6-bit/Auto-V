<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V Register</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#0a0a0a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .card{
            width:400px;
            background:#111;
            padding:30px;
            border-radius:12px;
            border:1px solid #333;
        }

        h2{
            text-align:center;
            color:#eab308;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #333;
            border-radius:8px;
            background:#1a1a1a;
            color:white;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#eab308;
            color:black;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#ca8a04;
        }

        a{
            color:#eab308;
            text-decoration:none;
        }

        p{
            text-align:center;
        }

        .error{
            color:#ef4444;
            font-size:14px;
            margin-top:-10px;
            margin-bottom:15px;
            display:none;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>Create Account</h2>

    <form onsubmit="register(event)">

        <input
            type="text"
            id="full_name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <input
            type="tel"
            id="phone"
            placeholder="Phone Number"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <div class="error" id="error-message"></div>

        <button type="submit">
            Create Account
        </button>

    </form>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</div>

<script>

const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

async function register(event){

    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const full_name = document.getElementById("full_name").value;
    const phone = document.getElementById("phone").value;
    const errorDiv = document.getElementById("error-message");

    // Hide previous error
    errorDiv.style.display = "none";
    errorDiv.textContent = "";

    const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options:{
            data:{
                full_name,
                phone
            }
        }
    });

    if(error){
        errorDiv.textContent = error.message;
        errorDiv.style.display = "block";
        return;
    }

    if(data.user){
        alert("Account created successfully! Please check your email for verification.");
        window.location.href = "login.html";
    }
}

</script>

</body>
</html>
