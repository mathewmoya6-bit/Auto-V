<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Payment</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: Arial; background: #0b1120; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #111827; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #eab308; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: #22c55e; font-size: 48px; }
        .error { color: #ef4444; font-size: 48px; }
        button { background: #eab308; color: black; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <div id="status">
        <div class="spinner"></div>
        <p>Processing payment...</p>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const urlParams = new URLSearchParams(window.location.search);
    const serviceId = urlParams.get('id');
    const amount = urlParams.get('amount');
    const mpesaPhone = urlParams.get('phone');
    const reference = urlParams.get('ref');
    
    // 🔴 IMPORTANT: UPDATE THIS WITH YOUR ACTUAL BACKEND URL 🔴
    // After deploying your Python backend to Render, copy the URL here
    const BACKEND_URL = "https://auto-v-backend.onrender.com";  // <-- CHANGE THIS
    
    async function initiatePayment() {
        try {
            const response = await fetch(`${BACKEND_URL}/api/mpesa/stkpush`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phone: mpesaPhone,
                    amount: parseInt(amount),
                    accountRef: reference,
                    description: 'AUTO-V Payment',
                    serviceId: serviceId
                })
            });
            
            const result = await response.json();
            
            if (result.ResponseCode === '0') {
                document.getElementById('status').innerHTML = `
                    <div class="spinner"></div>
                    <p>STK Push sent! Check your phone and enter PIN.</p>
                `;
                
                // Poll for payment confirmation
                const interval = setInterval(async () => {
                    const { data } = await supabase
                        .from('service_requests')
                        .select('payment_status')
                        .eq('id', serviceId)
                        .single();
                    
                    if (data?.payment_status === 'paid') {
                        clearInterval(interval);
                        document.getElementById('status').innerHTML = `
                            <div class="success">✅</div>
                            <p>Payment Successful!</p>
                            <button onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
                        `;
                    }
                }, 3000);
                
                setTimeout(() => clearInterval(interval), 120000);
            } else {
                throw new Error(result.ResponseDescription || 'STK Push failed');
            }
        } catch(err) {
            document.getElementById('status').innerHTML = `
                <div class="error">❌</div>
                <p>Payment failed: ${err.message}</p>
                <button onclick="window.location.href='customer-portal.html'">Try Again</button>
            `;
        }
    }
    
    initiatePayment();
</script>
</body>
</html>
