<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AUTO-V | Secure M-Pesa Payment</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0c15 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .payment-container { max-width: 500px; width: 100%; margin: auto; }
        .payment-card {
            background: #0f172a;
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(234, 179, 8, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 48px; margin-bottom: 8px; }
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #eab308, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        .service-details {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #94a3b8; font-size: 14px; }
        .detail-value { font-weight: 600; color: #eab308; }
        .amount {
            font-size: 36px;
            font-weight: 800;
            color: #22c55e;
            text-align: center;
            margin: 20px 0;
        }
        .mpesa-section {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .mpesa-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #22c55e;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: 500; font-size: 13px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }
        .paybill-info {
            background: #0f172a;
            border-radius: 16px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            border: 1px dashed #22c55e;
        }
        .paybill-number {
            font-size: 28px;
            font-weight: 800;
            color: #22c55e;
            letter-spacing: 2px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #eab308; color: #0a0c10; }
        .btn-primary:hover { background: #facc15; transform: translateY(-2px); }
        .btn-primary:disabled { background: #475569; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #334155; color: white; margin-top: 10px; }
        .btn-secondary:hover { background: #475569; }
        .status-box {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: #eab308;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-icon { font-size: 48px; color: #22c55e; margin-bottom: 15px; }
        .error-icon { font-size: 48px; color: #ef4444; margin-bottom: 15px; }
        .payment-success { background: #14532d; border: 1px solid #22c55e; }
        .payment-error { background: #7f1d1d; border: 1px solid #ef4444; }
        .payment-pending { background: #1e293b; border: 1px solid #eab308; }
        .timer { font-size: 14px; color: #94a3b8; margin-top: 15px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #eab308; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="payment-container">
    <div class="payment-card">
        <div class="logo">
            <div class="logo-icon">💳</div>
            <h1>Secure Payment</h1>
            <p>M-Pesa Paybill: <strong style="color:#22c55e">4095377</strong></p>
        </div>

        <div id="serviceDetails" class="service-details">
            <div class="detail-row">
                <span class="detail-label">Service Type</span>
                <span class="detail-value" id="serviceType">Loading...</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Vehicle</span>
                <span class="detail-value" id="vehicleInfo">Loading...</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Request ID</span>
                <span class="detail-value" id="requestId">Loading...</span>
            </div>
            <div class="amount" id="amount">KES 0</div>
        </div>

        <div class="mpesa-section">
            <div class="mpesa-logo">
                <span>📱</span>
                <span>M-PESA</span>
                <span>💚</span>
            </div>

            <div class="paybill-info">
                <div style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">Paybill Number</div>
                <div class="paybill-number">4095377</div>
                <div style="font-size: 11px; color: #64748b; margin-top: 5px;">AUTO-V Kenya</div>
            </div>

            <div class="form-group">
                <label>📱 M-Pesa Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="0712345678">
            </div>

            <button class="btn btn-primary" id="payBtn" onclick="initiatePayment()">
                💳 Pay with M-Pesa
            </button>
            <button class="btn btn-secondary" onclick="goBack()">
                ← Cancel & Return
            </button>
        </div>

        <div id="statusBox" class="status-box">
            <div id="statusContent"></div>
        </div>

        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>
</div>

<script>
    // Supabase Single Source of Truth
    const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // REAL M-PESA PRODUCTION CREDENTIALS
    const MPESA_CONFIG = {
        shortcode: "4095377",
        consumerKey: "LI2gcJZEheN8qCfXHEXV4gdYXvOBHVnv",
        consumerSecret: "aGGo8AuPJVpsZLcs",
        passkey: "7eb17a031bdfd5b4251863a1ddb72c5b9cd14f3385aa6a258c1442a0116e8277",
        callbackUrl: "https://tsvejnzxrxrrecgquxbq.supabase.co/functions/v1/mpesa-callback"
    };

    let currentUser = null;
    let serviceRequest = null;
    let pollInterval = null;
    let realtimeSubscription = null;

    // Get URL parameters
    function getUrlParams() {
        const params = new URLSearchParams(window.location.search);
        return {
            serviceId: params.get('id'),
            serviceType: params.get('type'),
            amount: params.get('amount'),
            reference: params.get('ref')
        };
    }

    // Check authentication
    async function checkAuth() {
        const { data: { user }, error } = await supabase.auth.getUser();
        if (error || !user) {
            window.location.href = "login.html";
            return false;
        }
        currentUser = user;
        return true;
    }

    // Load service request details
    async function loadServiceRequest() {
        const params = getUrlParams();
        
        if (!params.serviceId) {
            showError('No service request found. Please start a new request.');
            return;
        }

        try {
            const { data, error } = await supabase
                .from('service_requests')
                .select('*')
                .eq('id', params.serviceId)
                .single();

            if (error) throw error;
            if (!data) throw new Error('Service request not found');

            serviceRequest = data;

            // Update UI
            document.getElementById('serviceType').innerHTML = 
                serviceRequest.service_type === 'valuation' ? '💰 Vehicle Valuation' : '🔍 Vehicle Inspection';
            document.getElementById('vehicleInfo').innerHTML = 
                `${serviceRequest.make} ${serviceRequest.model} (${serviceRequest.registration_number})`;
            document.getElementById('requestId').innerHTML = serviceRequest.id.substring(0, 8).toUpperCase();
            document.getElementById('amount').innerHTML = `KES ${(serviceRequest.amount || 0).toLocaleString()}`;
            
            // Pre-fill phone if available
            if (serviceRequest.phone) {
                document.getElementById('phoneNumber').value = serviceRequest.phone;
            }

        } catch (error) {
            console.error('Error loading service:', error);
            showError('Failed to load service details: ' + error.message);
        }
    }

    // Get M-Pesa Access Token
    async function getMpesaAccessToken() {
        try {
            const auth = btoa(`${MPESA_CONFIG.consumerKey}:${MPESA_CONFIG.consumerSecret}`);
            const response = await fetch('https://api.safaricom.co.ke/oauth/v1/generate?grant_type=client_credentials', {
                method: 'GET',
                headers: { 'Authorization': `Basic ${auth}` }
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            if (!data.access_token) {
                throw new Error('Failed to get access token');
            }
            return data.access_token;
        } catch (error) {
            console.error('Token error:', error);
            throw new Error('M-Pesa service unavailable. Please try again.');
        }
    }

    // Format phone number to 254XXXXXXXXX
    function formatPhoneNumber(phone) {
        let formatted = phone.replace(/\D/g, '');
        if (formatted.startsWith('0')) formatted = '254' + formatted.substring(1);
        if (!formatted.startsWith('254')) formatted = '254' + formatted;
        return formatted;
    }

    // Initiate STK Push
    async function initiateMpesaStkPush(phoneNumber, amount, accountReference) {
        try {
            const accessToken = await getMpesaAccessToken();
            const timestamp = new Date().toISOString().replace(/[^0-9]/g, '').slice(0, 14);
            const password = btoa(`${MPESA_CONFIG.shortcode}${MPESA_CONFIG.passkey}${timestamp}`);
            const formattedPhone = formatPhoneNumber(phoneNumber);
            
            const requestBody = {
                BusinessShortCode: MPESA_CONFIG.shortcode,
                Password: password,
                Timestamp: timestamp,
                TransactionType: 'CustomerPayBillOnline',
                Amount: amount,
                PartyA: formattedPhone,
                PartyB: MPESA_CONFIG.shortcode,
                PhoneNumber: formattedPhone,
                CallBackURL: MPESA_CONFIG.callbackUrl,
                AccountReference: accountReference.substring(0, 12),
                TransactionDesc: `AUTO-V ${accountReference.substring(0, 13)}`
            };
            
            console.log('Initiating STK Push:', requestBody);
            
            const response = await fetch('https://api.safaricom.co.ke/mpesa/stkpush/v1/processrequest', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(requestBody)
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const result = await response.json();
            console.log('STK Push Response:', result);
            return result;
            
        } catch (error) {
            console.error('M-Pesa Error:', error);
            return { ResponseCode: '1', ResponseDescription: error.message };
        }
    }

    // Show status message
    function showStatus(message, type = 'pending') {
        const statusBox = document.getElementById('statusBox');
        const statusContent = document.getElementById('statusContent');
        
        statusBox.style.display = 'block';
        statusBox.className = `status-box payment-${type}`;
        
        if (type === 'pending') {
            statusContent.innerHTML = `
                <div class="spinner"></div>
                <p>${message}</p>
                <div class="timer">Please check your phone and enter M-Pesa PIN</div>
            `;
        } else if (type === 'success') {
            statusContent.innerHTML = `
                <div class="success-icon">✅</div>
                <p style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Payment Successful!</p>
                <p>${message}</p>
                <div class="timer">Redirecting to your results in <span id="countdown">3</span> seconds...</div>
            `;
            startCountdown();
        } else if (type === 'error') {
            statusContent.innerHTML = `
                <div class="error-icon">❌</div>
                <p style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Payment Failed</p>
                <p>${message}</p>
                <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 15px;">Try Again</button>
            `;
        }
    }

    function startCountdown() {
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            if (countdownEl) countdownEl.textContent = seconds;
            seconds--;
            if (seconds < 0) {
                clearInterval(interval);
                window.location.href = 'dashboard.html';
            }
        }, 1000);
    }

    function showError(message) {
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:20px;right:20px;background:#7f1d1d;color:#fecaca;padding:15px;border-radius:12px;z-index:1000;max-width:350px;';
        errorDiv.innerHTML = `❌ ${message}`;
        document.body.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 5000);
    }

    // Setup realtime subscription for payment status
    function setupRealtimeSubscription(serviceId) {
        if (realtimeSubscription) {
            supabase.removeChannel(realtimeSubscription);
        }
        
        realtimeSubscription = supabase
            .channel(`payment_status_${serviceId}`)
            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'service_requests',
                filter: `id=eq.${serviceId}`
            }, (payload) => {
                console.log('Realtime update:', payload);
                if (payload.new.payment_status === 'paid') {
                    if (pollInterval) clearInterval(pollInterval);
                    showStatus('Payment confirmed! Your results are ready.', 'success');
                }
            })
            .subscribe();
    }

    // Poll for payment status (fallback)
    function startPolling(serviceId) {
        if (pollInterval) clearInterval(pollInterval);
        
        pollInterval = setInterval(async () => {
            try {
                const { data, error } = await supabase
                    .from('service_requests')
                    .select('payment_status, status, result')
                    .eq('id', serviceId)
                    .single();
                
                if (data && data.payment_status === 'paid') {
                    clearInterval(pollInterval);
                    showStatus('Payment confirmed! Your results are ready.', 'success');
                }
            } catch (e) {
                console.error('Polling error:', e);
            }
        }, 3000);
        
        // Stop polling after 2 minutes
        setTimeout(() => {
            if (pollInterval) {
                clearInterval(pollInterval);
                if (serviceRequest?.payment_status !== 'paid') {
                    showStatus('Payment timeout. Please check your M-Pesa statement or contact support.', 'error');
                }
            }
        }, 120000);
    }

    // Main payment function
    async function initiatePayment() {
        const phone = document.getElementById('phoneNumber').value.trim();
        const payBtn = document.getElementById('payBtn');
        
        if (!phone) {
            showError('Please enter your M-Pesa phone number');
            return;
        }
        
        if (!phone.match(/^07\d{8}$/) && !phone.match(/^01\d{8}$/)) {
            showError('Please enter a valid M-Pesa number (07XXXXXXXX or 01XXXXXXXX)');
            return;
        }
        
        if (!serviceRequest) {
            showError('No service request found');
            return;
        }
        
        // Check if already paid
        if (serviceRequest.payment_status === 'paid') {
            showStatus('This service has already been paid for. Redirecting...', 'success');
            startCountdown();
            return;
        }
        
        payBtn.disabled = true;
        payBtn.innerHTML = '<span class="spinner"></span> Processing...';
        
        showStatus('Initiating payment... Please wait.', 'pending');
        
        try {
            const reference = `${serviceRequest.service_type === 'valuation' ? 'VAL' : 'INS'}${serviceRequest.id.substring(0, 8)}`;
            const result = await initiateMpesaStkPush(phone, serviceRequest.amount, reference);
            
            if (result.ResponseCode === '0') {
                // Update service with checkout request ID
                await supabase
                    .from('service_requests')
                    .update({ 
                        mpesa_checkout_request_id: result.CheckoutRequestID,
                        phone: phone
                    })
                    .eq('id', serviceRequest.id);
                
                showStatus('STK Push sent! Please check your phone and enter your M-Pesa PIN.', 'pending');
                
                // Setup realtime and polling
                setupRealtimeSubscription(serviceRequest.id);
                startPolling(serviceRequest.id);
                
            } else {
                throw new Error(result.ResponseDescription || 'Payment initiation failed');
            }
            
        } catch (error) {
            console.error('Payment error:', error);
            showStatus(error.message, 'error');
            payBtn.disabled = false;
            payBtn.innerHTML = '💳 Pay with M-Pesa';
        }
    }

    function goBack() {
        if (serviceRequest?.service_type === 'valuation') {
            window.location.href = 'valuation.html';
        } else if (serviceRequest?.service_type === 'inspection') {
            window.location.href = 'inspection.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    }

    // Initialize
    async function init() {
        const authed = await checkAuth();
        if (!authed) return;
        
        await loadServiceRequest();
        
        // If already paid, redirect
        if (serviceRequest && serviceRequest.payment_status === 'paid') {
            showStatus('This service has already been paid for. Redirecting...', 'success');
            startCountdown();
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
