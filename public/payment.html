<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - AUTO-V</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/stackblitz/starters/main/shell/static/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0a0a; color: white; padding: 30px; }
        h1 { color: #eab308; margin-bottom: 30px; }
        .payment-card { background: #111; border: 1px solid #222; padding: 30px; border-radius: 16px; max-width: 500px; margin: auto; }
        .payment-card input { width: 100%; padding: 12px; margin-bottom: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; }
        .btn { background: #eab308; color: #000; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { opacity: .9; }
        .status { margin-top: 20px; text-align: center; padding: 10px; border-radius: 8px; display: none; }
        .status.success { display: block; background: #22c55e; color: #000; }
        .status.error { display: block; background: #ef4444; color: white; }
        .status.info { display: block; background: #3b82f6; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>💳 M-Pesa Payment</h1>
    <div class="payment-card">
        <h3>Service: Vehicle Valuation</h3>
        <p style="color:#888;">Amount: KSh 2,500</p>
        
        <input type="text" id="phoneNumber" placeholder="Enter M-Pesa Phone Number (e.g. 0712345678)">
        <input type="text" id="amount" value="2500" placeholder="Amount (KSh)">
        
        <button class="btn" onclick="initiateMpesaPayment()">Pay via M-Pesa</button>
        
        <div id="statusMessage" class="status"></div>
        <div id="checkoutDetails" class="hidden" style="margin-top:20px;background:#1a1a1a;padding:15px;border-radius:8px;">
            <p id="checkoutInfo"></p>
        </div>
    </div>

    <script>
        // M-Pesa Daraja API Credentials (Your Real Credentials)
        const MPESA_CONFIG = {
            consumerKey: 'LI2gcJZEheN8qCfXHEXV4gdYXvOBHVnv',
            consumerSecret: 'aGGo8AuPJVpsZLcs',
            passkey: '7eb17a031bdfd5b4251863a1ddb72c5b9cd14f3385aa6a258c1442a0116e8277',
            shortCode: '4095377',
            environment: 'sandbox' // Change to 'production' when ready
        };

        // Supabase initialization (single source of truth)
        const SUPABASE_URL = 'https://tsvejnzxrxrrecgquxbq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MTkwMDAwMDAwMH0.dummy';
        
        let supabase;
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase connected');
        } catch (e) {
            console.warn('Supabase not initialized:', e);
        }

        // Helper function to get access token from M-Pesa
        async function getMpesaAccessToken() {
            const auth = btoa(`${MPESA_CONFIG.consumerKey}:${MPESA_CONFIG.consumerSecret}`);
            const response = await fetch('https://sandbox.safaricom.co.ke/oauth/v1/generate?grant_type=client_credentials', {
                method: 'GET',
                headers: {
                    'Authorization': `Basic ${auth}`
                }
            });
            const data = await response.json();
            return data.access_token;
        }

        // Initiate STK Push (Lipa Na M-Pesa Online)
        async function initiateMpesaPayment() {
            const phoneInput = document.getElementById('phoneNumber').value.trim();
            const amount = document.getElementById('amount').value;
            const statusDiv = document.getElementById('statusMessage');
            const checkoutDiv = document.getElementById('checkoutDetails');
            const checkoutInfo = document.getElementById('checkoutInfo');

            // Validate phone number
            if (!phoneInput || phoneInput.length < 10) {
                statusDiv.className = 'status error';
                statusDiv.textContent = 'Please enter a valid M-Pesa phone number (e.g. 0712345678)';
                return;
            }

            // Format phone number to international format (2547XXXXXXXX)
            let phone = phoneInput.replace(/\D/g, '');
            if (phone.startsWith('0')) phone = '254' + phone.slice(1);
            else if (!phone.startsWith('254')) phone = '254' + phone;

            statusDiv.className = 'status info';
            statusDiv.textContent = 'Processing payment... Please wait.';
            checkoutDiv.className = 'hidden';

            try {
                // Get access token
                const token = await getMpesaAccessToken();
                
                // Prepare STK Push request
                const timestamp = new Date().toISOString().replace(/[-:T.]/g, '').slice(0, 14);
                const password = btoa(`${MPESA_CONFIG.shortCode}${MPESA_CONFIG.passkey}${timestamp}`);
                
                const stkPushData = {
                    BusinessShortCode: MPESA_CONFIG.shortCode,
                    Password: password,
                    Timestamp: timestamp,
                    TransactionType: 'CustomerPayBillOnline',
                    Amount: amount,
                    PartyA: phone,
                    PartyB: MPESA_CONFIG.shortCode,
                    PhoneNumber: phone,
                    CallBackURL: 'https://your-domain.com/mpesa-callback', // Replace with your callback URL
                    AccountReference: 'AUTO-V ' + Date.now().toString().slice(-6),
                    TransactionDesc: 'Vehicle Valuation Payment'
                };

                // Send STK Push request
                const response = await fetch('https://sandbox.safaricom.co.ke/mpesa/stkpush/v1/processrequest', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(stkPushData)
                });

                const result = await response.json();
                console.log('M-Pesa response:', result);

                if (result.ResponseCode === '0') {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ M-Pesa STK Push sent! Check your phone for the payment prompt.';
                    
                    checkoutDiv.className = '';
                    checkoutInfo.innerHTML = `
                        <strong>Checkout Request ID:</strong> ${result.CheckoutRequestID}<br>
                        <strong>Amount:</strong> KSh ${amount}<br>
                        <strong>Phone:</strong> ${phone}<br>
                        <strong>Reference:</strong> ${stkPushData.AccountReference}<br>
                        <small style="color:#888;">Enter your M-Pesa PIN to complete payment.</small>
                    `;

                    // Store transaction in Supabase
                    if (supabase) {
                        const { data, error } = await supabase.from('transactions').insert([
                            {
                                phone: phone,
                                amount: parseInt(amount),
                                checkout_request_id: result.CheckoutRequestID,
                                status: 'pending',
                                reference: stkPushData.AccountReference,
                                created_at: new Date().toISOString()
                            }
                        ]);
                        if (error) console.error('Supabase insert error:', error);
                        else console.log('Transaction saved to Supabase:', data);
                    }

                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = `❌ Payment failed: ${result.ResponseDescription || 'Please try again'}`;
                }

            } catch (error) {
                console.error('M-Pesa error:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Error processing payment. Please check your credentials and try again.';
            }
        }

                // ... same body as sandbox
            });
        }
        */
    </script>
</body>
</html>
