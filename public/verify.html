<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AUTO-V Certificate Verification</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#111;
padding:30px;
border-radius:12px;
border:1px solid #222;
}

h1{
color:#eab308;
margin-bottom:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
background:#1a1a1a;
border:1px solid #333;
border-radius:8px;
color:white;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
background:#eab308;
color:black;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.result{
display:none;
margin-top:20px;
padding:20px;
border-radius:10px;
}

.valid{
background:#14532d;
}

.invalid{
background:#7f1d1d;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Certificate Verification</h1>

<input
type="text"
id="verificationCode"
placeholder="Enter Certificate Number or Verification Code">

<button onclick="verifyCertificate()">
Verify Certificate
</button>

<div id="result" class="result">

<h2 id="status"></h2>

<p>
Certificate Number:
<span id="certNumber"></span>
</p>

<p>
Certificate Type:
<span id="certType"></span>
</p>

<p>
Vehicle:
<span id="vehicle"></span>
</p>

<p>
Issue Date:
<span id="issueDate"></span>
</p>

</div>

</div>

</div>

<script>

const SUPABASE_URL =
"https://tsvejnzxrxrrecgquxbq.supabase.co";

const SUPABASE_ANON_KEY =
"YOUR_ANON_KEY";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

async function verifyCertificate(){

const code =
document.getElementById(
"verificationCode"
).value.trim();

if(!code){
alert("Enter verification code");
return;
}

const { data, error } =
await supabaseClient
.from("certificates")
.select(`
*,
vehicles (
registration_number,
make,
model
)
`)
.or(
`verification_code.eq.${code},
certificate_number.eq.${code}`
)
.single();

const result =
document.getElementById("result");

if(error || !data){

result.style.display="block";
result.className="result invalid";

document.getElementById(
"status"
).innerText =
"INVALID CERTIFICATE";

document.getElementById(
"certNumber"
).innerText="-";

document.getElementById(
"certType"
).innerText="-";

document.getElementById(
"vehicle"
).innerText="-";

document.getElementById(
"issueDate"
).innerText="-";

return;

}

result.style.display="block";
result.className="result valid";

document.getElementById(
"status"
).innerText =
"VALID CERTIFICATE";

document.getElementById(
"certNumber"
).innerText =
data.certificate_number;

document.getElementById(
"certType"
).innerText =
data.certificate_type;

document.getElementById(
"vehicle"
).innerText =
`${data.vehicles.registration_number}
 - ${data.vehicles.make}
 ${data.vehicles.model}`;

document.getElementById(
"issueDate"
).innerText =
new Date(
data.issued_at
).toLocaleDateString();

}

</script>

</body>
</html>
