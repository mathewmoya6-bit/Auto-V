<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Vehicle - AUTO-V</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0a0a0a;
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#111;
    border:1px solid #333;
    border-radius:12px;
    padding:25px;
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#1a1a1a;
    color:white;
    border:1px solid #333;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    background:#eab308;
    color:black;
    border:none;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

h1{
    color:#eab308;
}
</style>

</head>
<body>

<div class="container">

<h1>Add Vehicle</h1>

<div class="card">

<form id="vehicleForm">

<input
type="text"
id="registration_number"
placeholder="Registration Number"
required>

<input
type="text"
id="vin"
placeholder="VIN Number">

<input
type="text"
id="make"
placeholder="Make"
required>

<input
type="text"
id="model"
placeholder="Model"
required>

<input
type="number"
id="year"
placeholder="Year"
required>

<input
type="number"
id="engine_capacity"
placeholder="Engine Capacity (CC)">

<select id="fuel_type">
<option>Petrol</option>
<option>Diesel</option>
<option>Hybrid</option>
<option>Electric</option>
</select>

<select id="transmission">
<option>Automatic</option>
<option>Manual</option>
</select>

<input
type="number"
id="mileage"
placeholder="Mileage">

<button type="submit">
Save Vehicle
</button>

</form>

</div>

</div>

<script>

const SUPABASE_URL =
"https://tsvejnzxrxrrecgquxbq.supabase.co";

const SUPABASE_ANON_KEY =
"YOUR_ANON_KEY";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

document
.getElementById("vehicleForm")
.addEventListener("submit", saveVehicle);

async function saveVehicle(e){

e.preventDefault();

const {
data:{ user }
}
=
await supabaseClient.auth.getUser();

if(!user){
window.location.href="login.html";
return;
}

const vehicle = {

user_id: user.id,

registration_number:
document.getElementById("registration_number").value,

vin:
document.getElementById("vin").value,

make:
document.getElementById("make").value,

model:
document.getElementById("model").value,

year:
parseInt(document.getElementById("year").value),

engine_capacity:
parseInt(document.getElementById("engine_capacity").value || 0),

fuel_type:
document.getElementById("fuel_type").value,

transmission:
document.getElementById("transmission").value,

mileage:
parseInt(document.getElementById("mileage").value || 0)

};

const { error } =
await supabaseClient
.from("vehicles")
.insert(vehicle);

if(error){
alert(error.message);
return;
}

alert("Vehicle Saved Successfully");

window.location.href =
"dashboard.html";
}

</script>

</body>
</html>
