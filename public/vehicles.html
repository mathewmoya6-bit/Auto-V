<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Vehicle - AUTO-V</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    padding: 20px;
}

.container{
    max-width: 800px;
    margin: auto;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #333;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #eab308;
}

.back-btn {
    background: #333;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 6px;
}

.card{
    background: #111;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 25px;
}

h1{
    color: #eab308;
    margin-bottom: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

input, select{
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: none;
    border-color: #eab308;
}

button{
    background: #eab308;
    color: black;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
}

button:hover {
    background: #ca8a04;
}

button:disabled {
    background: #666;
    cursor: not-allowed;
}

.error {
    color: #ef4444;
    background: #7f1d1d;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    display: none;
}

.success {
    color: #22c55e;
    background: #14532d;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    display: none;
}

.spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 50%;
    border-top-color: #eab308;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<div class="container">

<div class="header">
    <div class="logo">🚗 AUTO-V</div>
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
</div>

<h1>Add New Vehicle</h1>

<div class="card">

<div class="error" id="errorMsg"></div>
<div class="success" id="successMsg"></div>

<form id="vehicleForm">
    <div class="form-grid">
        <div>
            <input type="text" id="registration_number" placeholder="Registration Number *" required>
        </div>
        <div>
            <input type="text" id="vin" placeholder="VIN / Chassis Number">
        </div>
        <div>
            <input type="text" id="make" placeholder="Make *" required>
        </div>
        <div>
            <input type="text" id="model" placeholder="Model *" required>
        </div>
        <div>
            <input type="number" id="year" placeholder="Year *" required>
        </div>
        <div>
            <input type="number" id="engine_capacity" placeholder="Engine Capacity (CC)">
        </div>
        <div>
            <select id="fuel_type">
                <option value="Petrol">Petrol</option>
                <option value="Diesel">Diesel</option>
                <option value="Hybrid">Hybrid</option>
                <option value="Electric">Electric</option>
            </select>
        </div>
        <div>
            <select id="transmission">
                <option value="Automatic">Automatic</option>
                <option value="Manual">Manual</option>
                <option value="CVT">CVT</option>
            </select>
        </div>
        <div>
            <input type="number" id="mileage" placeholder="Current Mileage (km)">
        </div>
        <div>
            <input type="text" id="color" placeholder="Color">
        </div>
    </div>

    <button type="submit" id="submitBtn">
        Save Vehicle
    </button>
</form>

</div>

</div>

<script>

// ============================================
// SUPABASE CONFIGURATION - SINGLE SOURCE OF TRUTH
// ============================================
const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

// ============================================
// CHECK AUTHENTICATION
// ============================================
async function checkAuth() {
    const { data: { user }, error } = await supabase.auth.getUser();
    
    if (error || !user) {
        window.location.href = "login.html";
        return false;
    }
    
    currentUser = user;
    return true;
}

// ============================================
// SAVE VEHICLE TO SUPABASE
// ============================================
async function saveVehicle(event) {
    event.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    
    // Reset messages
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    // Get form values
    const registration = document.getElementById('registration_number').value.trim();
    const make = document.getElementById('make').value.trim();
    const model = document.getElementById('model').value.trim();
    const year = parseInt(document.getElementById('year').value);
    const vin = document.getElementById('vin').value.trim();
    const engineCapacity = parseInt(document.getElementById('engine_capacity').value) || 0;
    const fuelType = document.getElementById('fuel_type').value;
    const transmission = document.getElementById('transmission').value;
    const mileage = parseInt(document.getElementById('mileage').value) || 0;
    const color = document.getElementById('color').value.trim();
    
    // Validate required fields
    if (!registration) {
        errorDiv.innerHTML = 'Registration Number is required';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (!make) {
        errorDiv.innerHTML = 'Make is required';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (!model) {
        errorDiv.innerHTML = 'Model is required';
        errorDiv.style.display = 'block';
        return;
    }
    
    if (!year || year < 1900 || year > new Date().getFullYear() + 1) {
        errorDiv.innerHTML = 'Valid Year is required';
        errorDiv.style.display = 'block';
        return;
    }
    
    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Saving...';
    
    try {
        // Check if vehicle with same registration already exists for this user
        const { data: existing, error: checkError } = await supabase
            .from('vehicles')
            .select('id')
            .eq('user_id', currentUser.id)
            .eq('registration_number', registration.toUpperCase())
            .maybeSingle();
        
        if (existing) {
            errorDiv.innerHTML = 'A vehicle with this registration number already exists';
            errorDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Save Vehicle';
            return;
        }
        
        // Prepare vehicle data
        const vehicleData = {
            user_id: currentUser.id,
            registration_number: registration.toUpperCase(),
            make: make,
            model: model,
            year: year,
            vin: vin || null,
            engine_capacity: engineCapacity,
            fuel_type: fuelType,
            transmission: transmission,
            mileage: mileage,
            color: color || null,
            created_at: new Date().toISOString(),
            updated_at: new Date().toISOString()
        };
        
        // Insert into Supabase
        const { data, error } = await supabase
            .from('vehicles')
            .insert([vehicleData])
            .select();
        
        if (error) {
            if (error.code === '23505') {
                errorDiv.innerHTML = 'Vehicle with this registration number already exists';
            } else {
                errorDiv.innerHTML = 'Database error: ' + error.message;
            }
            errorDiv.style.display = 'block';
            return;
        }
        
        // Success
        successDiv.innerHTML = '✓ Vehicle saved successfully! Redirecting to dashboard...';
        successDiv.style.display = 'block';
        
        // Reset form
        document.getElementById('vehicleForm').reset();
        
        // Redirect after 2 seconds
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 2000);
        
    } catch (error) {
        errorDiv.innerHTML = 'Error: ' + error.message;
        errorDiv.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Save Vehicle';
    }
}

// ============================================
// INITIALIZE
// ============================================
async function init() {
    const isAuth = await checkAuth();
    if (isAuth) {
        // Set up form submit handler
        document.getElementById('vehicleForm').addEventListener('submit', saveVehicle);
        
        // Set current year as default for year field
        const yearInput = document.getElementById('year');
        if (yearInput && !yearInput.value) {
            yearInput.value = new Date().getFullYear();
        }
    }
}

// Start the app
init();

</script>

</body>
</html>
