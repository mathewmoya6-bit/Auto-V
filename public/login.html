<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0c15 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(234, 179, 8, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 48px; margin-bottom: 8px; }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #eab308, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; font-size: 13px; }
        input {
            width: 100%;
            padding: 14px 18px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #eab308;
            color: #0a0c10;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #facc15; transform: translateY(-2px); }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .error-message { background: rgba(127, 29, 29, 0.9); color: #fecaca; border-left: 3px solid #ef4444; }
        .success-message { background: rgba(20, 83, 45, 0.9); color: #bbf7d0; border-left: 3px solid #22c55e; }
        .signup-link { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 14px; }
        .signup-link a { color: #eab308; cursor: pointer; text-decoration: none; font-weight: 600; }
        .mpesa-badge {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #334155;
            font-size: 11px;
            color: #64748b;
        }
        .mpesa-badge strong { color: #22c55e; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🚗</div>
            <h1>AUTO-V</h1>
            <p>Vehicle Intelligence Platform</p>
        </div>
        
        <div id="messageBox" class="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Login</button>
        </form>
        
        <div class="signup-link">
            Don't have an account? <a id="signupLink">Sign up</a>
        </div>
        
        <div class="mpesa-badge">
            💳 Pay with M-Pesa Paybill: <strong>4095377</strong>
        </div>
    </div>

    <script>
        // Initialize Supabase client
        const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Get DOM elements
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageBox = document.getElementById('messageBox');
        
        // Handle login
        async function handleLogin(email, password) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                showMessage(error.message, 'error');
                return false;
            }
            
            showMessage('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
            return true;
        }
        
        // Handle signup
        async function handleSignup(email, password) {
            const { error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                showMessage(error.message, 'error');
                return false;
            }
            
            showMessage('Signup successful! Check your email to verify, then login.', 'success');
            return true;
        }
        
        // Show message helper
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `message ${type}-message`;
            messageBox.style.display = 'block';
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
        
        // Form submit handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }
            
            await handleLogin(email, password);
        });
        
        // Signup handler
        document.getElementById('signupLink').addEventListener('click', async () => {
            const email = prompt('Enter your email:');
            if (!email) return;
            
            const password = prompt('Enter your password (min 6 characters):');
            if (!password || password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            await handleSignup(email, password);
        });
        
        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = "dashboard.html";
            }
        }
        
        checkSession();
    </script>
</body>
</html>
