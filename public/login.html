<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AUTO-V Login</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0a0a0a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            width:350px;
            background:#111;
            padding:30px;
            border-radius:12px;
            border:1px solid #333;
        }

        h2{
            text-align:center;
            color:#eab308;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            background:#1a1a1a;
            border:1px solid #333;
            color:white;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#eab308;
            color:black;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        button:disabled{
            background:#666;
            cursor:not-allowed;
        }

        a{
            color:#eab308;
            text-decoration:none;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        .error{
            color:#ef4444;
            font-size:14px;
            margin-bottom:15px;
            display:none;
            background:#7f1d1d;
            padding:10px;
            border-radius:6px;
            text-align:center;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>AUTO-V Login</h2>

        <form onsubmit="login(event)">

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <div class="error" id="error-message"></div>

            <button type="submit" id="login-btn">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

    </div>

<script>

const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

// Check if user is already logged in
async function checkSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        // Already logged in, redirect to dashboard
        window.location.href = "dashboard.html";
    }
}

async function login(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("error-message");
    const loginBtn = document.getElementById("login-btn");

    // Reset error
    errorDiv.style.display = "none";
    errorDiv.textContent = "";

    // Disable button
    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email,
            password
        });

        if (error) {
            throw error;
        }

        if (data.session) {
            // Show success message briefly
            errorDiv.style.color = "#22c55e";
            errorDiv.style.background = "#14532d";
            errorDiv.textContent = "Login successful! Redirecting...";
            errorDiv.style.display = "block";
            
            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        } else {
            throw new Error("Login failed");
        }

    } catch (error) {
        errorDiv.style.color = "#ef4444";
        errorDiv.style.background = "#7f1d1d";
        errorDiv.textContent = error.message;
        errorDiv.style.display = "block";
        
        // Re-enable button
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
    }
}

// Check session on page load
checkSession();

</script>

</body>
</html>
