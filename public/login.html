<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AUTO-V Login | Vehicle Valuation & Inspection System</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 32px;
            color: #eab308;
            letter-spacing: 2px;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .card {
            background: #111;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: #eab308;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 5px rgba(234, 179, 8, 0.3);
        }

        .input-group input::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #eab308;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #ca8a04;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #eab308;
        }

        p {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
        }

        p a {
            color: #eab308;
            text-decoration: none;
            font-weight: bold;
        }

        p a:hover {
            text-decoration: underline;
        }

        .error {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            background: #7f1d1d;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #ef4444;
        }

        .success {
            color: #22c55e;
            background: #14532d;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
            border-left: 4px solid #22c55e;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #eab308;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .forgot-password {
            text-align: right;
        }

        hr {
            border-color: #333;
            margin: 20px 0;
        }

        .demo-credentials {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        .demo-credentials span {
            color: #eab308;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px;
            }
            .logo h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🚗</div>
            <h1>AUTO-V</h1>
            <p>Professional Vehicle Valuation & Inspection System</p>
            <p>ISO 9001:2024 | NTSA/KEBS Certified</p>
        </div>

        <div class="card">

            <h2>Welcome Back</h2>

            <div class="error" id="error-message"></div>
            <div class="success" id="success-message"></div>

            <form onsubmit="login(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="links">
                    <div></div>
                    <div class="forgot-password">
                        <a href="forgot-password.html">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" id="login-btn">
                    Login
                </button>
            </form>

            <hr>

            <p>
                Don't have an account?
                <a href="register.html">Create Account</a>
            </p>

            <div class="demo-credentials">
                <span>🔐 Demo Credentials</span><br>
                Email: demo@autov.co.ke<br>
                Password: demo123
            </div>

        </div>
    </div>

<script>

// ============================================
// SUPABASE - SINGLE SOURCE OF TRUTH
// ============================================
const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

// ============================================
// CHECK IF USER IS ALREADY LOGGED IN
// ============================================
async function checkSession() {
    try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        
        if (error) {
            console.error('Session check error:', error);
            return;
        }
        
        if (session) {
            // User is already logged in, redirect to dashboard
            console.log('User already logged in, redirecting to dashboard...');
            window.location.href = "dashboard.html";
        }
    } catch (err) {
        console.error('Session check failed:', err);
    }
}

// ============================================
// LOGIN FUNCTION
// ============================================
async function login(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorDiv = document.getElementById("error-message");
    const successDiv = document.getElementById("success-message");
    const loginBtn = document.getElementById("login-btn");

    // Reset messages
    errorDiv.style.display = "none";
    successDiv.style.display = "none";
    errorDiv.textContent = "";
    successDiv.textContent = "";

    // Basic validation
    if (!email || !password) {
        errorDiv.textContent = "Please enter both email and password";
        errorDiv.style.display = "block";
        return;
    }

    // Disable button and show loading
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';

    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            // Handle specific error messages
            if (error.message === "Invalid login credentials") {
                throw new Error("Invalid email or password. Please try again.");
            } else if (error.message.includes("Email not confirmed")) {
                throw new Error("Please verify your email address before logging in.");
            } else {
                throw new Error(error.message);
            }
        }

        if (data.session) {
            // Show success message
            successDiv.textContent = "✓ Login successful! Redirecting to dashboard...";
            successDiv.style.display = "block";
            
            // Store session info (Supabase handles this automatically)
            console.log('User logged in successfully:', data.user.email);
            
            // Redirect to dashboard after a short delay
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
        } else {
            throw new Error("Unable to create session. Please try again.");
        }

    } catch (error) {
        console.error('Login error:', error.message);
        errorDiv.textContent = error.message;
        errorDiv.style.display = "block";
        
        // Re-enable button
        loginBtn.disabled = false;
        loginBtn.innerHTML = "Login";
    }
}

// ============================================
// ADD ENTER KEY SUPPORT
// ============================================
document.addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        const form = document.querySelector('form');
        if (form && document.activeElement === form.querySelector('input')) {
            event.preventDefault();
            login(event);
        }
    }
});

// ============================================
// INITIALIZE
// ============================================
async function init() {
    // Check if user is already logged in
    await checkSession();
    console.log('AUTO-V Login page initialized');
}

// Start the app
init();

</script>

</body>
</html>
