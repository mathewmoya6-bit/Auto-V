<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AUTO-V | Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #0f172a;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #eab308, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 5px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; font-size: 13px; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0f1c;
            border: 1px solid #2d3a4e;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #eab308;
            color: black;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #facc15;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .error-message { background: #7f1d1d; color: #fecaca; border-left: 3px solid #ef4444; }
        .success-message { background: #14532d; color: #bbf7d0; border-left: 3px solid #22c55e; }
        .info-message { background: #1e293b; color: #eab308; border-left: 3px solid #eab308; }
        .signup-link { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 14px; }
        .signup-link a { color: #eab308; cursor: pointer; text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }
        .mpesa-badge {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            font-size: 11px;
            color: #64748b;
        }
        .mpesa-badge strong {
            color: #22c55e;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #eab308;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🚗 AUTO-V</h1>
            <p>Vehicle Intelligence Platform</p>
        </div>
        <div id="messageBox" class="message"></div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="loginBtn">Login</button>
        <div class="signup-link">
            Don't have an account? <a id="signupBtn">Sign up</a>
        </div>
        <div class="mpesa-badge">
            💳 M-Pesa Paybill: <strong>4095377</strong> | AUTO-V Kenya
        </div>
    </div>

    <script>
        (function() {
            // Supabase Configuration
            const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
            
            // Create Supabase client
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // DOM Elements
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const signupBtn = document.getElementById('signupBtn');
            const messageBox = document.getElementById('messageBox');

            // Show message helper
            function showMessage(text, type = 'error') {
                messageBox.textContent = text;
                messageBox.className = `message ${type}-message`;
                messageBox.style.display = 'block';
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 5000);
            }

            // Handle Login
            async function handleLogin() {
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    showMessage('Please enter email and password', 'error');
                    return;
                }

                // Disable button and show loading
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                    if (error) {
                        console.error('Login error:', error);
                        if (error.message === 'Invalid login credentials') {
                            showMessage('Invalid email or password. Please try again.', 'error');
                        } else if (error.message.includes('Email not confirmed')) {
                            showMessage('Please verify your email address. Check your inbox.', 'info');
                        } else {
                            showMessage(error.message, 'error');
                        }
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Login';
                    } else {
                        showMessage('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = "dashboard.html";
                        }, 1500);
                    }
                } catch (err) {
                    console.error('Unexpected error:', err);
                    showMessage('Network error. Please try again.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login';
                }
            }

            // Handle Signup
            async function handleSignup() {
                const email = prompt('Enter your email:');
                if (!email) return;

                if (!email.includes('@') || !email.includes('.')) {
                    showMessage('Please enter a valid email address', 'error');
                    return;
                }

                const password = prompt('Enter your password (min 6 characters):');
                if (!password || password.length < 6) {
                    showMessage('Password must be at least 6 characters', 'error');
                    return;
                }

                signupBtn.disabled = true;
                signupBtn.innerHTML = '<span class="spinner"></span> Creating account...';

                try {
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            emailRedirectTo: window.location.origin + '/dashboard.html'
                        }
                    });

                    if (error) {
                        if (error.message.includes('User already registered')) {
                            showMessage('User already registered. Please login instead.', 'info');
                        } else {
                            showMessage(error.message, 'error');
                        }
                    } else {
                        showMessage('Signup successful! Check your email to verify your account.', 'success');
                    }
                } catch (err) {
                    showMessage('Network error. Please try again.', 'error');
                } finally {
                    signupBtn.disabled = false;
                    signupBtn.innerHTML = 'Sign up';
                }
            }

            // Check if already logged in
            async function checkSession() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        console.log('Session found, redirecting to dashboard');
                        window.location.href = "dashboard.html";
                    } else {
                        console.log('No session found, staying on login page');
                    }
                } catch (err) {
                    console.error('Session check error:', err);
                }
            }

            // Event listeners
            loginBtn.addEventListener('click', handleLogin);
            signupBtn.addEventListener('click', handleSignup);
            
            // Enter key support
            emailInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            // Check existing session on page load
            checkSession();
        })();
    </script>
</body>
</html>
