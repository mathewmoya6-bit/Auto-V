<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #0f172a;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #1e293b;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #eab308, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; }
        input {
            width: 100%;
            padding: 14px;
            background: #0a0f1c;
            border: 1px solid #2d3a4e;
            border-radius: 16px;
            color: white;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #eab308;
            color: black;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .error-message { background: #7f1d1d; color: #fecaca; }
        .success-message { background: #14532d; color: #bbf7d0; }
        .signup-link { text-align: center; margin-top: 20px; color: #94a3b8; }
        .signup-link a { color: #eab308; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1>🚗 AUTO-V</h1></div>
        <div id="messageBox" class="message"></div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="loginBtn">Login</button>
        <div class="signup-link">
            Don't have an account? <a id="signupBtn">Sign up</a>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else window.location.href = "dashboard.html";
        }
        
        async function handleSignup() {
            const email = prompt('Enter email:');
            const password = prompt('Enter password (min 6 chars):');
            if (email && password) {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert('Signup successful! Check your email to verify.');
            }
        }
        
        document.getElementById('loginBtn').onclick = handleLogin;
        document.getElementById('signupBtn').onclick = handleSignup;
        
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = "dashboard.html";
        });
    </script>
</body>
</html>
