<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTO-V Real Valuation System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: auto;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #333;
    flex-wrap: wrap;
    gap: 15px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #eab308;
}

.back-btn {
    background: #333;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 6px;
}

.progress-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 10px;
}

.progress-step {
    flex: 1;
    text-align: center;
    padding: 10px;
    background: #111;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
}

.progress-step.active {
    background: #eab308;
    color: black;
    font-weight: bold;
}

.progress-step.completed {
    border: 1px solid #22c55e;
    color: #22c55e;
}

.card {
    background: #111;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid #333;
    margin-bottom: 20px;
}

h2 {
    color: #eab308;
    margin-bottom: 20px;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
}

h3 {
    color: #eab308;
    margin: 15px 0 10px 0;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 8px;
    color: #ccc;
    font-size: 14px;
}

label.required:after {
    content: " *";
    color: #ef4444;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    border-radius: 8px;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #eab308;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-right: 10px;
}

.btn-primary {
    background: #eab308;
    color: black;
}

.btn-primary:hover {
    background: #ca8a04;
}

.btn-secondary {
    background: #333;
    color: white;
}

.btn-secondary:hover {
    background: #444;
}

.btn-success {
    background: #22c55e;
    color: white;
}

.result-box {
    background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
    border: 2px solid #eab308;
    border-radius: 12px;
    padding: 25px;
    margin-top: 20px;
}

.result-value {
    font-size: 48px;
    font-weight: bold;
    color: #eab308;
    text-align: center;
}

.breakdown-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #333;
}

.loading {
    text-align: center;
    padding: 40px;
    color: #eab308;
}

.nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.image-preview {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-top: 10px;
}

.preview-img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
}

.spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 50%;
    border-top-color: #eab308;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="header">
    <div class="logo">🚗 AUTO-V Real Valuation System</div>
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
</div>

<div class="progress-bar">
    <div class="progress-step active" data-step="1">1. Vehicle Details</div>
    <div class="progress-step" data-step="2">2. Condition & Images</div>
    <div class="progress-step" data-step="3">3. Documents</div>
    <div class="progress-step" data-step="4">4. Result</div>
</div>

<!-- Step 1 -->
<div id="step1" class="card">
    <h2>📋 Vehicle Identification</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>Registration Number</label>
            <input type="text" id="registration" placeholder="KXX 123A">
        </div>
        <div class="form-group">
            <label>VIN / Chassis</label>
            <input type="text" id="vin" placeholder="JTEGD34V000123456">
        </div>
        <div class="form-group">
            <label>Make</label>
            <input type="text" id="make" placeholder="Toyota">
        </div>
        <div class="form-group">
            <label>Model</label>
            <input type="text" id="model" placeholder="Corolla">
        </div>
        <div class="form-group">
            <label>Year</label>
            <select id="year"></select>
        </div>
        <div class="form-group">
            <label>Body Color</label>
            <select id="color">
                <option value="White">White</option>
                <option value="Black">Black</option>
                <option value="Silver">Silver</option>
                <option value="Red">Red</option>
                <option value="Blue">Blue</option>
            </select>
        </div>
        <div class="form-group">
            <label>Transmission</label>
            <select id="transmission">
                <option value="Manual">Manual</option>
                <option value="Automatic">Automatic</option>
            </select>
        </div>
        <div class="form-group">
            <label>Fuel Type</label>
            <select id="fuel">
                <option value="Petrol">Petrol</option>
                <option value="Diesel">Diesel</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>
        <div class="form-group">
            <label>Mileage (km)</label>
            <input type="number" id="mileage" value="50000">
        </div>
    </div>
    <div class="nav-buttons">
        <div></div>
        <button class="btn btn-primary" onclick="nextStep(2)">Next →</button>
    </div>
</div>

<!-- Step 2 -->
<div id="step2" class="card" style="display:none">
    <h2>🔧 Condition & Images</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>Engine Condition (1-10)</label>
            <input type="number" id="engine" min="1" max="10" step="0.5" value="8">
        </div>
        <div class="form-group">
            <label>Exterior Condition (1-10)</label>
            <input type="number" id="exterior" min="1" max="10" step="0.5" value="8">
        </div>
        <div class="form-group">
            <label>Interior Condition (1-10)</label>
            <input type="number" id="interior" min="1" max="10" step="0.5" value="8">
        </div>
        <div class="form-group">
            <label>Accident History</label>
            <select id="accident">
                <option value="none">None</option>
                <option value="minor">Minor</option>
                <option value="major">Major</option>
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label>Upload Vehicle Photos (for AI analysis)</label>
        <input type="file" id="vehiclePhotos" multiple accept="image/*" onchange="previewPhotos()">
        <div id="photoPreview" class="image-preview"></div>
        <div id="aiAnalysis" style="margin-top:10px;font-size:12px;color:#eab308;"></div>
    </div>
    
    <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="prevStep(1)">← Back</button>
        <button class="btn btn-primary" onclick="nextStep(3)">Next →</button>
    </div>
</div>

<!-- Step 3 -->
<div id="step3" class="card" style="display:none">
    <h2>📄 Documents & Legal</h2>
    <div class="form-grid">
        <div class="form-group">
            <label>Number of Owners</label>
            <select id="owners">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4+</option>
            </select>
        </div>
        <div class="form-group">
            <label>Service History</label>
            <select id="serviceHistory">
                <option value="Full">Full</option>
                <option value="Partial">Partial</option>
                <option value="None">None</option>
            </select>
        </div>
        <div class="form-group">
            <label>Usage Type</label>
            <select id="usage">
                <option value="Private">Private</option>
                <option value="Commercial">Commercial</option>
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label>Upload Logbook/Registration</label>
        <input type="file" id="logbook" accept=".pdf,.jpg,.png">
    </div>
    
    <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="prevStep(2)">← Back</button>
        <button class="btn btn-primary" onclick="calculateRealValuation()">Calculate Valuation →</button>
    </div>
</div>

<!-- Step 4 -->
<div id="step4" class="card" style="display:none">
    <h2>💰 Valuation Result</h2>
    <div id="result" class="result-box">
        <div class="result-value" id="finalValue">KES 0</div>
        <div id="breakdown"></div>
        <div style="margin-top:20px;display:flex;gap:10px;">
            <button class="btn btn-success" onclick="saveToDatabase()">✓ Save to Database</button>
            <button class="btn btn-secondary" onclick="nextStep(1)">New Valuation</button>
        </div>
    </div>
</div>

</div>

<script>
// Supabase Config
const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let uploadedPhotos = [];
let valuationResult = null;

// Populate years
function populateYears() {
    const select = document.getElementById('year');
    const currentYear = new Date().getFullYear();
    for (let y = currentYear; y >= 1990; y--) {
        select.innerHTML += `<option value="${y}">${y}</option>`;
    }
}

// Navigation
function nextStep(step) {
    for(let i=1; i<=4; i++) {
        document.getElementById(`step${i}`).style.display = i === step ? 'block' : 'none';
    }
    document.querySelectorAll('.progress-step').forEach((el, idx) => {
        if(idx+1 === step) el.classList.add('active');
        else el.classList.remove('active');
        if(idx+1 < step) el.classList.add('completed');
        else el.classList.remove('completed');
    });
}

function prevStep(step) { nextStep(step); }

// Photo preview
function previewPhotos() {
    const files = document.getElementById('vehiclePhotos').files;
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = '';
    uploadedPhotos = [];
    
    for(let i=0; i<files.length; i++) {
        uploadedPhotos.push(files[i]);
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'preview-img';
            preview.appendChild(img);
        };
        reader.readAsDataURL(files[i]);
    }
}

// REAL VALUATION CALCULATION
async function calculateRealValuation() {
    // Show loading
    const btn = event.target;
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Calculating...';
    
    try {
        // Collect data
        const vehicleData = {
            registration: document.getElementById('registration').value,
            vin: document.getElementById('vin').value,
            make: document.getElementById('make').value,
            model: document.getElementById('model').value,
            year: parseInt(document.getElementById('year').value),
            color: document.getElementById('color').value,
            transmission: document.getElementById('transmission').value,
            fuel: document.getElementById('fuel').value,
            mileage: parseInt(document.getElementById('mileage').value),
            engine_condition: parseFloat(document.getElementById('engine').value),
            exterior_condition: parseFloat(document.getElementById('exterior').value),
            interior_condition: parseFloat(document.getElementById('interior').value),
            accident_history: document.getElementById('accident').value,
            owners: parseInt(document.getElementById('owners').value),
            service_history: document.getElementById('serviceHistory').value,
            usage: document.getElementById('usage').value
        };
        
        // Call REAL Python backend for AI valuation
        let aiValuation = null;
        if(uploadedPhotos.length > 0) {
            const formData = new FormData();
            uploadedPhotos.forEach(photo => formData.append('images', photo));
            formData.append('vehicle_data', JSON.stringify(vehicleData));
            
            try {
                const response = await fetch('https://your-python-backend.vercel.app/api/valuation', {
                    method: 'POST',
                    body: formData
                });
                if(response.ok) {
                    aiValuation = await response.json();
                }
            } catch(e) {
                console.log('Backend not available, using local calculation');
            }
        }
        
        // Local calculation if backend not available
        let finalValue = calculateLocalValuation(vehicleData);
        
        // Use AI result if available
        if(aiValuation && aiValuation.amount) {
            finalValue = aiValuation.amount;
        }
        
        valuationResult = {
            ...vehicleData,
            amount: finalValue,
            ai_used: !!aiValuation,
            damage_detected: aiValuation?.damage || [],
            created_at: new Date().toISOString()
        };
        
        // Display result
        document.getElementById('finalValue').innerHTML = `KES ${finalValue.toLocaleString()}`;
        
        const breakdown = `
            <div class="breakdown-item"><span>Base Value</span><span>KES ${calculateBaseValue(vehicleData).toLocaleString()}</span></div>
            <div class="breakdown-item"><span>Age Adjustment</span><span>${calculateAgeFactor(vehicleData.year)}%</span></div>
            <div class="breakdown-item"><span>Mileage Adjustment</span><span>${calculateMileageFactor(vehicleData.mileage)}%</span></div>
            <div class="breakdown-item"><span>Condition Score</span><span>${calculateConditionScore(vehicleData)}/10</span></div>
            <div class="breakdown-item"><span>Accident Penalty</span><span>${getAccidentPenalty(vehicleData.accident_history)}%</span></div>
            ${valuationResult.ai_used ? '<div class="breakdown-item"><span>🤖 AI Analysis</span><span>Applied</span></div>' : ''}
        `;
        document.getElementById('breakdown').innerHTML = breakdown;
        
        nextStep(4);
        
    } catch(error) {
        alert('Error: ' + error.message);
    } finally {
        btn.disabled = false;
        btn.innerText = originalText;
    }
}

// Local valuation calculation
function calculateLocalValuation(data) {
    let base = calculateBaseValue(data);
    let ageFactor = calculateAgeFactor(data.year) / 100;
    let mileageFactor = calculateMileageFactor(data.mileage) / 100;
    let conditionScore = calculateConditionScore(data) / 10;
    let accidentPenalty = getAccidentPenalty(data.accident_history) / 100;
    let ownersPenalty = getOwnersPenalty(data.owners);
    let serviceBonus = getServiceBonus(data.service_history);
    let usagePenalty = getUsagePenalty(data.usage);
    
    let value = base * ageFactor * mileageFactor * conditionScore * accidentPenalty * ownersPenalty * serviceBonus * usagePenalty;
    return Math.round(value);
}

function calculateBaseValue(data) {
    const makeValues = {
        'Toyota': 2500000, 'Honda': 2300000, 'Nissan': 2100000,
        'Subaru': 2800000, 'Mercedes': 5000000, 'BMW': 4800000,
        'Audi': 4500000, 'Volkswagen': 2200000, 'Ford': 2000000
    };
    return makeValues[data.make] || 1800000;
}

function calculateAgeFactor(year) {
    const age = new Date().getFullYear() - year;
    return Math.max(30, 100 - (age * 5));
}

function calculateMileageFactor(mileage) {
    return Math.max(40, 100 - (mileage / 2000));
}

function calculateConditionScore(data) {
    return (data.engine_condition + data.exterior_condition + data.interior_condition) / 3;
}

function getAccidentPenalty(history) {
    if(history === 'none') return 100;
    if(history === 'minor') return 75;
    return 50;
}

function getOwnersPenalty(owners) {
    if(owners === 1) return 1.0;
    if(owners === 2) return 0.95;
    if(owners === 3) return 0.90;
    return 0.85;
}

function getServiceBonus(history) {
    if(history === 'Full') return 1.05;
    if(history === 'Partial') return 1.0;
    return 0.95;
}

function getUsagePenalty(usage) {
    return usage === 'Private' ? 1.0 : 0.85;
}

// Save to Supabase
async function saveToDatabase() {
    if(!valuationResult) return;
    
    const { data: { user } } = await supabase.auth.getUser();
    if(!user) {
        window.location.href = 'login.html';
        return;
    }
    
    const { error } = await supabase
        .from('valuations')
        .insert([{
            user_id: user.id,
            registration: valuationResult.registration,
            vin: valuationResult.vin,
            make: valuationResult.make,
            model: valuationResult.model,
            year: valuationResult.year,
            mileage: valuationResult.mileage,
            amount: valuationResult.amount,
            condition_data: {
                engine: valuationResult.engine_condition,
                exterior: valuationResult.exterior_condition,
                interior: valuationResult.interior_condition
            },
            accident_history: valuationResult.accident_history,
            owners: valuationResult.owners,
            valuation_date: new Date().toISOString()
        }]);
    
    if(error) {
        alert('Error saving: ' + error.message);
    } else {
        alert('✓ Valuation saved to database!');
        window.location.href = 'dashboard.html';
    }
}

// Check auth
async function checkAuth() {
    const { data: { user } } = await supabase.auth.getUser();
    if(!user) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;
    
    // Load existing vehicles for suggestions
    const { data: vehicles } = await supabase
        .from('vehicles')
        .select('*')
        .eq('user_id', user.id)
        .limit(5);
    
    if(vehicles && vehicles.length > 0) {
        const lastVehicle = vehicles[0];
        document.getElementById('make').value = lastVehicle.make || '';
        document.getElementById('model').value = lastVehicle.model || '';
        document.getElementById('year').value = lastVehicle.year || '';
        document.getElementById('registration').value = lastVehicle.registration_number || '';
    }
}

// Initialize
populateYears();
checkAuth();

</script>

</body>
</html>
