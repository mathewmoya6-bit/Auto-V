<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Valuation - AUTO-V</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0a0a0a;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #333;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #eab308;
}

.back-btn {
    background: #333;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 6px;
}

.card{
    background:#111;
    padding:25px;
    border-radius:12px;
    border:1px solid #333;
}

h2{
    color:#eab308;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#ccc;
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#1a1a1a;
    color:white;
    border:1px solid #333;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#eab308;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ca8a04;
}

button:disabled{
    background:#666;
    cursor:not-allowed;
}

.result{
    margin-top:20px;
    padding:20px;
    border:2px solid #eab308;
    border-radius:10px;
    display:none;
}

.result h3{
    font-size:28px;
    text-align:center;
    margin-bottom:15px;
}

.breakdown{
    margin:15px 0;
    padding:10px;
    background:#1a1a1a;
    border-radius:8px;
    font-size:14px;
}

.breakdown-item{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #333;
}

.loading{
    text-align:center;
    padding:20px;
    color:#eab308;
}

.error{
    color:#ef4444;
    background:#7f1d1d;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    display:none;
}

.success{
    color:#22c55e;
    background:#14532d;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    display:none;
}

.spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 50%;
    border-top-color: #eab308;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.image-preview {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 10px;
    margin-top: 10px;
}

.preview-img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid #333;
}

@media (max-width: 768px) {
    .form-row {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>

<div class="container">

<div class="header">
    <div class="logo">🚗 AUTO-V Valuation</div>
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
</div>

<div class="card">

<h2>Vehicle Valuation</h2>

<div class="error" id="errorMsg"></div>
<div class="success" id="successMsg"></div>

<!-- Vehicle Selection -->
<label>Select Vehicle</label>
<select id="vehicle">
    <option value="">Loading vehicles...</option>
</select>

<!-- Condition -->
<label>Vehicle Condition</label>
<select id="condition">
    <option value="Excellent">Excellent - Like new</option>
    <option value="Good" selected>Good - Normal wear</option>
    <option value="Fair">Fair - Needs repairs</option>
    <option value="Poor">Poor - Major issues</option>
</select>

<!-- Valuation Type -->
<label>Valuation Type</label>
<select id="valuation_type">
    <option value="Market Value">Market Value</option>
    <option value="Insurance Value">Insurance Value</option>
    <option value="Forced Sale Value">Forced Sale Value</option>
    <option value="Trade-In Value">Trade-In Value</option>
    <option value="Auction Value">Auction Value</option>
</select>

<!-- Additional Details -->
<div class="form-row">
    <div>
        <label>Current Mileage (km)</label>
        <input type="number" id="mileage" placeholder="Enter current mileage">
    </div>
    <div>
        <label>Number of Owners</label>
        <select id="owners">
            <option value="1">1 (First owner)</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4+</option>
        </select>
    </div>
</div>

<div class="form-row">
    <div>
        <label>Service History</label>
        <select id="serviceHistory">
            <option value="Full">Full Service History</option>
            <option value="Partial">Partial Service History</option>
            <option value="None">No Service History</option>
        </select>
    </div>
    <div>
        <label>Accident History</label>
        <select id="accident">
            <option value="none">No Accidents</option>
            <option value="minor">Minor Accident</option>
            <option value="major">Major Accident</option>
        </select>
    </div>
</div>

<!-- Image Upload -->
<label>Upload Vehicle Photos (for AI analysis)</label>
<input type="file" id="vehiclePhotos" multiple accept="image/*" onchange="previewPhotos()">
<div id="photoPreview" class="image-preview"></div>

<button onclick="calculateRealValuation()" id="calcBtn">
    Calculate Valuation
</button>

<div id="result" class="result">
    <h3 id="amount"></h3>
    <div id="breakdown" class="breakdown"></div>
    <button onclick="saveValuation()" id="saveBtn">
        Save Valuation
    </button>
</div>

</div>

</div>

<script>

// ============================================
// SUPABASE CONFIGURATION - SINGLE SOURCE OF TRUTH
// ============================================
const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Global variables
let valuationResult = 0;
let currentUser = null;
let uploadedPhotos = [];
let selectedVehicle = null;

// ============================================
// CHECK AUTHENTICATION
// ============================================
async function checkAuth() {
    const { data: { user }, error } = await supabase.auth.getUser();
    
    if (error || !user) {
        window.location.href = "login.html";
        return false;
    }
    
    currentUser = user;
    return true;
}

// ============================================
// LOAD VEHICLES FROM SUPABASE
// ============================================
async function loadVehicles() {
    const select = document.getElementById("vehicle");
    select.innerHTML = '<option value="">Loading vehicles...</option>';
    
    try {
        const { data, error } = await supabase
            .from("vehicles")
            .select("*")
            .eq("user_id", currentUser.id)
            .order("created_at", { ascending: false });
        
        if (error) throw error;
        
        if (!data || data.length === 0) {
            select.innerHTML = '<option value="">No vehicles found. Add a vehicle first</option>';
            return;
        }
        
        select.innerHTML = '<option value="">Select a vehicle...</option>';
        
        data.forEach(v => {
            select.innerHTML += `
                <option value="${v.id}" 
                        data-year="${v.year}" 
                        data-make="${v.make}" 
                        data-model="${v.model}"
                        data-registration="${v.registration_number}"
                        data-mileage="${v.mileage || 0}">
                    ${v.registration_number} - ${v.make} ${v.model} (${v.year})
                </option>
            `;
        });
        
        // Auto-fill mileage when vehicle selected
        select.onchange = function() {
            const selected = select.options[select.selectedIndex];
            if (selected && selected.value) {
                const mileage = selected.dataset.mileage;
                if (mileage) {
                    document.getElementById('mileage').value = mileage;
                }
                selectedVehicle = {
                    id: selected.value,
                    make: selected.dataset.make,
                    model: selected.dataset.model,
                    year: selected.dataset.year,
                    registration: selected.dataset.registration
                };
            }
        };
        
    } catch (error) {
        console.error("Error loading vehicles:", error);
        select.innerHTML = '<option value="">Error loading vehicles</option>';
    }
}

// ============================================
// PREVIEW UPLOADED PHOTOS
// ============================================
function previewPhotos() {
    const files = document.getElementById('vehiclePhotos').files;
    const preview = document.getElementById('photoPreview');
    preview.innerHTML = '';
    uploadedPhotos = [];
    
    for (let i = 0; i < files.length && i < 5; i++) {
        uploadedPhotos.push(files[i]);
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'preview-img';
            preview.appendChild(img);
        };
        reader.readAsDataURL(files[i]);
    }
}

// ============================================
// CALCULATE REAL VALUATION - INTEGRATED WITH BACKEND
// ============================================
async function calculateRealValuation() {
    const btn = document.getElementById('calcBtn');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    
    // Hide previous messages
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    // Validate vehicle selection
    const vehicleSelect = document.getElementById('vehicle');
    if (!vehicleSelect.value) {
        errorDiv.innerHTML = 'Please select a vehicle';
        errorDiv.style.display = 'block';
        return;
    }
    
    // Disable button and show loading
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Calculating...';
    
    try {
        // Get selected vehicle data
        const selectedOption = vehicleSelect.options[vehicleSelect.selectedIndex];
        
        // Collect form data
        const vehicleData = {
            // Vehicle identification
            registration: selectedOption.dataset.registration || '',
            make: selectedOption.dataset.make || '',
            model: selectedOption.dataset.model || '',
            year: parseInt(selectedOption.dataset.year) || 2000,
            vehicle_id: vehicleSelect.value,
            
            // Valuation parameters
            condition: document.getElementById('condition').value,
            valuation_type: document.getElementById('valuation_type').value,
            mileage: parseInt(document.getElementById('mileage').value) || 0,
            owners: parseInt(document.getElementById('owners').value) || 1,
            service_history: document.getElementById('serviceHistory').value,
            accident_history: document.getElementById('accident').value,
            
            // Condition scores (derived from condition selection)
            engine_condition: getConditionScore(document.getElementById('condition').value),
            exterior_condition: getConditionScore(document.getElementById('condition').value),
            interior_condition: getConditionScore(document.getElementById('condition').value),
            
            // Usage
            usage: 'Private'
        };
        
        // Prepare FormData for API call
        const formData = new FormData();
        formData.append('vehicle_data', JSON.stringify(vehicleData));
        
        // Add images
        const imageFiles = document.getElementById('vehiclePhotos').files;
        for(let i = 0; i < imageFiles.length; i++) {
            formData.append('images', imageFiles[i]);
        }
        
        // Get session token from Supabase
        const { data: { session } } = await supabase.auth.getSession();
        const token = session?.access_token;
        
        // Call FastAPI backend (update with your actual backend URL)
        // For now, use local calculation if backend not available
        let result;
        
        try {
            const API_URL = window.location.hostname === 'localhost' 
                ? 'http://localhost:8000' 
                : 'https://your-backend.vercel.app';
                
            const response = await fetch(`${API_URL}/api/valuation`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                },
                body: formData
            });
            
            if(response.ok) {
                result = await response.json();
            } else {
                throw new Error('Backend unavailable');
            }
        } catch(backendError) {
            console.log('Backend not available, using local calculation');
            // Local calculation as fallback
            result = await calculateLocalValuation(vehicleData);
        }
        
        // Store valuation result
        valuationResult = {
            ...vehicleData,
            amount: result.amount,
            damage_detected: result.damage || [],
            ai_confidence: result.ai_confidence || 0.85,
            created_at: new Date().toISOString()
        };
        
        // Display result
        document.getElementById('amount').innerHTML = `KES ${result.amount.toLocaleString()}`;
        
        // Build breakdown HTML
        let breakdownHtml = `
            <div class="breakdown-item">
                <span>💰 Valuation Amount</span>
                <span><strong>KES ${result.amount.toLocaleString()}</strong></span>
            </div>
            <div class="breakdown-item">
                <span>🤖 AI Confidence</span>
                <span>${(result.ai_confidence * 100).toFixed(0)}%</span>
            </div>
            <div class="breakdown-item">
                <span>📋 Vehicle</span>
                <span>${vehicleData.make} ${vehicleData.model} (${vehicleData.year})</span>
            </div>
            <div class="breakdown-item">
                <span>📊 Condition</span>
                <span>${vehicleData.condition}</span>
            </div>
            <div class="breakdown-item">
                <span>🔍 Damage Detected</span>
                <span>${result.damage?.length || 0} issues found</span>
            </div>
        `;
        
        // Add damage details if any
        if(result.damage && result.damage.length > 0) {
            result.damage.forEach(d => {
                breakdownHtml += `<div class="breakdown-item"><span>⚠️</span><span>${d}</span></div>`;
            });
        }
        
        breakdownHtml += `
            <div class="breakdown-item">
                <span>🏷️ Valuation Type</span>
                <span>${vehicleData.valuation_type}</span>
            </div>
            <div class="breakdown-item">
                <span>📅 Valuation Date</span>
                <span>${new Date().toLocaleDateString()}</span>
            </div>
        `;
        
        document.getElementById('breakdown').innerHTML = breakdownHtml;
        document.getElementById('result').style.display = 'block';
        
        // Scroll to result
        document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        
    } catch(error) {
        errorDiv.innerHTML = 'Error: ' + error.message;
        errorDiv.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Calculate Valuation';
    }
}

// ============================================
// LOCAL VALUATION CALCULATION (FALLBACK)
// ============================================
async function calculateLocalValuation(data) {
    // Base values by make
    const makeValues = {
        'Toyota': 2500000, 'Honda': 2300000, 'Nissan': 2100000,
        'Subaru': 2800000, 'Mercedes': 5000000, 'BMW': 4800000,
        'Audi': 4500000, 'Volkswagen': 2200000, 'Ford': 2000000,
        'Mazda': 1900000, 'Hyundai': 1800000, 'Kia': 1700000
    };
    
    let baseValue = makeValues[data.make] || 1800000;
    
    // Age depreciation
    const currentYear = new Date().getFullYear();
    const age = currentYear - data.year;
    const depreciation = Math.max(0.35, 1 - (age * 0.07));
    
    // Mileage factor
    const mileageFactor = Math.max(0.45, 1 - (data.mileage / 280000));
    
    // Condition factor
    const conditionFactors = {
        'Excellent': 1.0,
        'Good': 0.88,
        'Fair': 0.72,
        'Poor': 0.55
    };
    const conditionFactor = conditionFactors[data.condition] || 0.85;
    
    // Valuation type multiplier
    const typeMultipliers = {
        'Market Value': 1.0,
        'Insurance Value': 1.1,
        'Forced Sale Value': 0.7,
        'Trade-In Value': 0.8,
        'Auction Value': 0.75
    };
    const typeMultiplier = typeMultipliers[data.valuation_type] || 1.0;
    
    // Owners penalty
    const ownersPenalty = Math.max(0.88, 1 - ((data.owners - 1) * 0.035));
    
    // Service history bonus
    const serviceBonus = data.service_history === 'Full' ? 1.05 : 
                        (data.service_history === 'None' ? 0.94 : 1.0);
    
    // Accident penalty
    const accidentPenalty = data.accident_history === 'none' ? 1.0 :
                           (data.accident_history === 'minor' ? 0.82 : 0.55);
    
    // Calculate final value
    let finalValue = baseValue * depreciation * mileageFactor * conditionFactor * 
                     typeMultiplier * ownersPenalty * serviceBonus * accidentPenalty;
    
    finalValue = Math.round(finalValue);
    
    return {
        amount: finalValue,
        damage: ["No significant damage detected from images"],
        ai_confidence: 0.82,
        valuation_id: null
    };
}

// ============================================
// GET CONDITION SCORE
// ============================================
function getConditionScore(condition) {
    const scores = {
        'Excellent': 9.5,
        'Good': 8.0,
        'Fair': 6.0,
        'Poor': 4.0
    };
    return scores[condition] || 7.0;
}

// ============================================
// SAVE VALUATION TO SUPABASE
// ============================================
async function saveValuation() {
    const saveBtn = document.getElementById('saveBtn');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner"></span> Saving...';
    
    try {
        const vehicleSelect = document.getElementById('vehicle');
        const selectedOption = vehicleSelect.options[vehicleSelect.selectedIndex];
        
        const valuationRecord = {
            user_id: currentUser.id,
            vehicle_id: vehicleSelect.value,
            vehicle_registration: selectedOption.dataset.registration,
            make: selectedOption.dataset.make,
            model: selectedOption.dataset.model,
            year: parseInt(selectedOption.dataset.year),
            valuation_type: document.getElementById('valuation_type').value,
            condition: document.getElementById('condition').value,
            mileage: parseInt(document.getElementById('mileage').value) || 0,
            owners: parseInt(document.getElementById('owners').value),
            service_history: document.getElementById('serviceHistory').value,
            accident_history: document.getElementById('accident').value,
            amount: valuationResult.amount,
            damage_detected: valuationResult.damage_detected || [],
            ai_confidence: valuationResult.ai_confidence,
            valuation_date: new Date().toISOString(),
            status: 'completed'
        };
        
        // Save to Supabase
        const { data, error } = await supabase
            .from('valuations')
            .insert([valuationRecord])
            .select();
        
        if (error) throw error;
        
        successDiv.innerHTML = '✓ Valuation saved successfully! Redirecting to dashboard...';
        successDiv.style.display = 'block';
        
        // Redirect after 2 seconds
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 2000);
        
    } catch (error) {
        errorDiv.innerHTML = 'Error saving: ' + error.message;
        errorDiv.style.display = 'block';
        saveBtn.disabled = false;
        saveBtn.innerHTML = 'Save Valuation';
    }
}

// ============================================
// INITIALIZE PAGE
// ============================================
async function init() {
    const isAuth = await checkAuth();
    if (isAuth) {
        await loadVehicles();
    }
}

// Start the app
init();

</script>

</body>
</html>
