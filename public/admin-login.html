<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTO-V | Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #0f172a;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e293b;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #eab308 0%, #facc15 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0f1c;
            border: 1px solid #2d3a4e;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #eab308;
            color: #0a0c10;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #facc15;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .error-message {
            background: #7f1d1d;
            color: #fecaca;
            border-left: 4px solid #ef4444;
        }

        .success-message {
            background: #14532d;
            color: #bbf7d0;
            border-left: 4px solid #22c55e;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #eab308;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-badge {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1e293b;
            color: #eab308;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🚗 AUTO-V</h1>
            <p>Administrator Portal</p>
        </div>

        <div id="messageBox" class="message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>📧 Admin Email</label>
                <input type="email" id="email" required placeholder="admin@autov.co.ke" autocomplete="email">
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" id="loginBtn">
                🔐 Admin Login
            </button>
        </form>

        <div class="admin-badge">
            ⚡ Secure Admin Access Only
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if already logged in
        async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Verify admin role
                const { data: profile } = await supabase
                    .from('user_profiles')
                    .select('role')
                    .eq('id', session.user.id)
                    .single();
                
                if (profile?.role === 'admin') {
                    window.location.href = "admin-dashboard.html";
                }
            }
        }
        
        // Handle login
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const messageBox = document.getElementById('messageBox');
            
            if (!email || !password) {
                showMessage('Please enter both email and password', 'error');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Authenticating...';
            
            try {
                // Attempt sign in
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                if (data.session) {
                    // Check if user has admin role
                    const { data: profile, error: profileError } = await supabase
                        .from('user_profiles')
                        .select('role')
                        .eq('id', data.session.user.id)
                        .single();
                    
                    if (profileError || profile?.role !== 'admin') {
                        await supabase.auth.signOut();
                        throw new Error('Unauthorized: Admin access only');
                    }
                    
                    showMessage('✅ Admin login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = "admin-dashboard.html";
                    }, 1500);
                }
                
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Login failed. ';
                if (error.message === 'Invalid login credentials') {
                    errorMessage = '❌ Invalid email or password. Please try again.';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMessage = '📧 Please verify your email address before logging in.';
                } else if (error.message.includes('Admin access only')) {
                    errorMessage = '⛔ Access denied. Admin privileges required.';
                } else {
                    errorMessage += error.message;
                }
                
                showMessage(errorMessage, 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '🔐 Admin Login';
            }
        }
        
        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type === 'error' ? 'error-message' : 'success-message'}`;
            messageBox.style.display = 'block';
            
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
        
        // Check existing session
        checkExistingSession();
    </script>
</body>
</html>
