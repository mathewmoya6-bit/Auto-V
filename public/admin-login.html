<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AUTO-V | Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23eab308' rx='20'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='%23000'>🚗</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: #0f172a;
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
        }
        .login-container:hover {
            transform: translateY(-3px);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #eab308, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 5px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 500; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0a0f1c;
            border: 1px solid #2d3a4e;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #eab308;
            box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #eab308;
            color: black;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #facc15;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .error-message { background: #7f1d1d; color: #fecaca; border-left: 3px solid #ef4444; }
        .success-message { background: #14532d; color: #bbf7d0; border-left: 3px solid #22c55e; }
        .info-message { background: #1e293b; color: #eab308; border-left: 3px solid #eab308; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: #eab308;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .mpesa-badge {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            font-size: 11px;
            color: #64748b;
        }
        .mpesa-badge strong {
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🚗 AUTO-V ADMIN</h1>
            <p>Administrator Portal</p>
        </div>
        <div id="messageBox" class="message"></div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@autov.co.ke">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="loginBtn">Admin Login</button>
        <div class="mpesa-badge">
            💳 M-Pesa Paybill: <strong>4095377</strong> | AUTO-V Kenya
        </div>
    </div>

    <script>
        (function() {
            // Supabase Single Source of Truth
            const SUPABASE_URL = "https://tsvejnzxrxrrecgquxbq.supabase.co";
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdmVqbnp4cnhycmVjZ3F1eGJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODczNjgsImV4cCI6MjA5Njc2MzM2OH0.PCEppwafuPatBoWh4OnhzgHv6fA9uF5-bWW9mmf2VoQ";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // DOM Elements
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const messageBox = document.getElementById('messageBox');

            // Show message helper
            function showMessage(text, type = 'error') {
                messageBox.textContent = text;
                messageBox.className = `message ${type}-message`;
                messageBox.style.display = 'block';
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 5000);
            }

            // Handle Admin Login
            async function handleLogin() {
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    showMessage('Please enter email and password', 'error');
                    return;
                }

                // Disable button and show loading
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span> Authenticating...';

                try {
                    // Step 1: Sign in with Supabase
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                    if (error) {
                        console.error('Login error:', error);
                        if (error.message === 'Invalid login credentials') {
                            showMessage('Invalid email or password. Please try again.', 'error');
                        } else if (error.message.includes('Email not confirmed')) {
                            showMessage('Please verify your email address before logging in.', 'info');
                        } else {
                            showMessage(error.message, 'error');
                        }
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Admin Login';
                        return;
                    }

                    if (!data.user) {
                        showMessage('Login failed. Please try again.', 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Admin Login';
                        return;
                    }

                    // Step 2: Check if user has admin role
                    const { data: profile, error: profileError } = await supabase
                        .from('user_profiles')
                        .select('role')
                        .eq('id', data.user.id)
                        .single();

                    if (profileError) {
                        console.error('Profile error:', profileError);
                        showMessage('User profile not found. Please contact support.', 'error');
                        await supabase.auth.signOut();
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Admin Login';
                        return;
                    }

                    // Step 3: Verify admin role
                    if (profile.role !== 'admin') {
                        showMessage('Access denied. Admin privileges required.', 'error');
                        await supabase.auth.signOut();
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = 'Admin Login';
                        return;
                    }

                    // Success - redirect to admin dashboard
                    showMessage('Admin login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = "admin-dashboard.html";
                    }, 1500);

                } catch (err) {
                    console.error('Unexpected error:', err);
                    showMessage('Network error. Please try again.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Admin Login';
                }
            }

            // Check if already logged in as admin
            async function checkExistingSession() {
                try {
                    const { data: { session }, error } = await supabase.auth.getSession();
                    
                    if (session && session.user) {
                        // Check if user has admin role
                        const { data: profile } = await supabase
                            .from('user_profiles')
                            .select('role')
                            .eq('id', session.user.id)
                            .single();
                        
                        if (profile && profile.role === 'admin') {
                            // Already logged in as admin, redirect to dashboard
                            window.location.href = "admin-dashboard.html";
                        } else if (profile && profile.role !== 'admin') {
                            // Logged in but not admin, sign out
                            await supabase.auth.signOut();
                        }
                    }
                } catch (err) {
                    console.error('Session check error:', err);
                }
            }

            // Event listeners
            loginBtn.addEventListener('click', handleLogin);
            
            // Enter key support
            emailInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            // Check existing session on page load
            checkExistingSession();
        })();
    </script>
</body>
</html>
