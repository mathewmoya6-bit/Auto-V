<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AUTO-V</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/stackblitz/starters/main/shell/static/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #111; padding: 40px; border-radius: 16px; border: 1px solid #222; width: 400px; max-width: 90%; }
        .login-box h1 { color: #eab308; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; }
        button { width: 100%; padding: 12px; background: #eab308; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: .3s; }
        button:hover { opacity: .9; }
        .link { text-align: center; margin-top: 20px; color: #888; }
        .link a { color: #eab308; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Admin Login</h1>
        <input type="email" id="email" placeholder="admin@auto-v.co.ke">
        <input type="password" id="password" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <div class="link"><a href="index.html">← Back to Home</a></div>
    </div>
    <script src="supabase.js"></script>
    <script>
        async function adminLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert('Login failed: ' + error.message);
            else window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
